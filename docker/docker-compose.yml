name: dntu02-cruzrtwin

services:
  mongo:
    image: mongo:4.4
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - cruzrtwin_mongo_data:/data/db
    networks:
      - fiware-net

  orion:
    image: fiware/orion:3.10.0
    container_name: orion
    restart: always
    depends_on:
      - mongo
    ports:
      - "1026:1026"
    command: -dbhost mongo -logLevel DEBUG
    networks:
      - fiware-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - fiware-net

  iot-agent:
    image: fiware/iotagent-json:1.26.0
    container_name: iot-agent
    restart: always
    depends_on:
      - mongo
      - orion
      - mosquitto
    ports:
      - "4041:4041"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4041
      - IOTA_MONGO_HOST=mongo
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentjson
      - IOTA_HTTP_PORT=7896
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_DEFAULT_RESOURCE=/iot/json
      - IOTA_DEFAULT_TRANSPORT=MQTT
      - IOTA_PROVIDER_URL=http://iot-agent:4041
      - IOTA_LOG_LEVEL=DEBUG
    networks:
      - fiware-net

  device-simulator:
    image: fiware/device-simulator:latest
    container_name: device-simulator
    restart: "no"
    depends_on:
      - mosquitto
      - iot-agent
      - orion
    volumes:
      - ./simulator/config:/app/config
    working_dir: /app
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ORION_HOST=orion
      - ORION_PORT=1026
    command: >
      sh -c "mkdir -p /app/config &&
             while [ ! -f /app/config/simulation.json ]; do
               echo 'Waiting for config file...';
               sleep 2;
             done &&
             /opt/fiware-device-simulator/bin/fiwareDeviceSimulatorCLI -c /app/config/simulation.json"
    networks:
      - fiware-net

  tuya-bridge:
    build: ./tuya-bridge
    image: dntu02/tuya-2-mqtt-sg:latest
    container_name: tuya-bridge
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - ./tuya2mqtt.yaml:/app/config.yaml:ro
    env_file:
      - ../.env
    environment:
      - LOG_LEVEL=INFO
    networks:
      - fiware-net

  backend:
    build:
      context: ../
      dockerfile: Dockerfile
    image: dntu02/cruzrtwin-backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
      - ../models:/app/models
      - ../evidence:/app/evidence
    env_file:
      - ../.env
    environment:
      - ORION_ENABLED=false
      - LOG_DIR=/app/logs
    networks:
      - fiware-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: dntu02/cruzrtwin-frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fiware-net

volumes:
  cruzrtwin_mongo_data:

networks:
  fiware-net:
    driver: bridge
