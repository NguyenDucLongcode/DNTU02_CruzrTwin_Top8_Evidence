<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DNTU Asset Exporter</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        .btn { padding: 10px 20px; margin: 10px; background: #00aa55; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 5px; }
        .btn:hover { background: #00ff88; color: black; }
        .container { display: flex; flex-direction: column; width: 350px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <h1>Xuất Asset Mô Hình Rời (GLB)</h1>
    
    <div class="container">
        <h3>3 Loại Phòng (Room Models)</h3>
        <button class="btn" id="btnR1T">⬇️ Room Type 1 (Phòng họp) - Dãy Trái</button>
        <button class="btn" id="btnR1B">⬇️ Room Type 1 (Phòng họp) - Dãy Phải</button>
        <button class="btn" id="btnR2T">⬇️ Room Type 2 (Tiêu chuẩn) - Dãy Trái</button>
        <button class="btn" id="btnR2B">⬇️ Room Type 2 (Tiêu chuẩn) - Dãy Phải</button>
        <button class="btn" id="btnR3T">⬇️ Room Type 3 (4 dãy) - Dãy Trái</button>
        <button class="btn" id="btnR3B">⬇️ Room Type 3 (4 dãy) - Dãy Phải</button>

        <h3>3 Loại Tầng (Floor Models)</h3>
        <button class="btn" id="btnF1">⬇️ Floor Type 1 (Tầng trệt)</button>
        <button class="btn" id="btnF2">⬇️ Floor Type 2 (Tầng giữa)</button>
        <button class="btn" id="btnF3">⬇️ Floor Type 3 (Tầng cao)</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.3 });
        const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x003355, transparent: true, opacity: 0.3, depthWrite: false });
        const furnEdgeMat = new THREE.LineBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.5 });
        const furnSolidMat = new THREE.MeshBasicMaterial({ color: 0x002211, transparent: true, opacity: 0.6 });
        const tvMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        const tvScreenMat = new THREE.MeshBasicMaterial({ color: 0x0044ff });
        const doorMat = new THREE.LineBasicMaterial({ color: 0xffff00 });
        const roomWallMat = new THREE.MeshBasicMaterial({ color: 0x001122, transparent: true, opacity: 0.4 });

        function createFurnitureBlock(geom) {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(geom, furnSolidMat));
            group.add(new THREE.LineSegments(new THREE.EdgesGeometry(geom), furnEdgeMat));
            return group;
        }

        function addTV(roomGroup, width, height) {
            const tvGroup = new THREE.Group();
            const tv = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.5, 2.5), tvMat);
            const screen = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.3, 2.3), tvScreenMat);
            tvGroup.add(tv); tvGroup.add(screen);
            tvGroup.position.set(width/2 - 0.2, height/2 + 0.5, 0);
            roomGroup.add(tvGroup);
        }

        function createSingleRoom(typeIdx, isTopRow = true) {
            const width = 12; const height = 4; const depth = 8;
            const roomGroup = new THREE.Group();
            
            const geom = new THREE.BoxGeometry(width, height, depth);
            const frame = new THREE.LineSegments(new THREE.EdgesGeometry(geom), lineMaterial);
            const solid = new THREE.Mesh(geom, roomWallMat);
            frame.position.y = height / 2; solid.position.y = height / 2;
            roomGroup.add(frame); roomGroup.add(solid);

            if (typeIdx === 0) {
                const tableGeom = new THREE.CylinderGeometry(1.2, 1.2, 0.5, 8);
                for(let x = -width/2 + 3; x <= width/2 - 3; x += 4) {
                    for(let z = -depth/2 + 2; z <= depth/2 - 2; z += 4) {
                        const table = createFurnitureBlock(tableGeom);
                        table.position.set(x, 0.25, z);
                        roomGroup.add(table);
                    }
                }
            } else if (typeIdx === 1) {
                const deskGeom = new THREE.BoxGeometry(2, 0.6, 1);
                [-1.5, 1.5].forEach(z => {
                    for(let i = 0; i < 4; i++) {
                        const desk = createFurnitureBlock(deskGeom);
                        desk.position.set(-3 + i * 2, 0.3, z);
                        roomGroup.add(desk);
                    }
                });
            } else {
                const deskGeom = new THREE.BoxGeometry(1.2, 0.5, 0.8);
                const chairGeom = new THREE.BoxGeometry(0.4, 0.4, 0.4); 
                for(let x = -width/2 + 2.5; x <= width/2 - 2.5; x += 2) {
                    [-2.8, -0.8, 0.8, 2.8].forEach(z => {
                        let d = createFurnitureBlock(deskGeom); d.position.set(x, 0.25, z);
                        let c = createFurnitureBlock(chairGeom); c.position.set(x, 0.2, z > 0 ? z+0.7 : z-0.7);
                        roomGroup.add(d); roomGroup.add(c);
                    });
                }
            }

            addTV(roomGroup, width, height);

            if (typeIdx > 0) {
                const teacherDeskGeom = new THREE.BoxGeometry(1.2, 0.8, 2.5);
                const teacherDesk = createFurnitureBlock(teacherDeskGeom);
                const deskZ = isTopRow ? -2.5 : 2.5;
                teacherDesk.position.set(width/2 - 1.5, 0.4, deskZ);
                roomGroup.add(teacherDesk);
            }

            const doorGeom = new THREE.PlaneGeometry(2, 2.5);
            const doorWallZ = isTopRow ? depth/2 + 0.05 : -depth/2 - 0.05;
            const door1 = new THREE.LineSegments(new THREE.EdgesGeometry(doorGeom), doorMat);
            door1.position.set(-width/3, 1.25, doorWallZ);
            const door2 = new THREE.LineSegments(new THREE.EdgesGeometry(doorGeom), doorMat);
            door2.position.set(width/3, 1.25, doorWallZ);
            roomGroup.add(door1); roomGroup.add(door2);

            const acMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const acGeom = new THREE.BoxGeometry(1.5, 0.1, 1.5);
            const ac1 = new THREE.Mesh(acGeom, acMat); ac1.position.set(-width/4, height - 0.05, 0); ac1.name = "Device:AC1";
            const ac2 = new THREE.Mesh(acGeom, acMat); ac2.position.set(width/4, height - 0.05, 0); ac2.name = "Device:AC2";
            roomGroup.add(ac1); roomGroup.add(ac2);

            const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
            const lightGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.05, 16);
            [{x:-4,z:-2}, {x:4,z:-2}, {x:-4,z:2}, {x:4,z:2}].forEach((p, idx) => {
                const l = new THREE.Mesh(lightGeom, lightMat); l.position.set(p.x, height-0.02, p.z);
                l.name = "Device:LIGHT" + (idx+1);
                roomGroup.add(l);
            });

            const camMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cam1Group = new THREE.Group();
            const cam1 = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 4), camMat);
            cam1.rotation.set(Math.PI/4, Math.PI/4, 0); cam1Group.add(cam1);
            cam1Group.position.set(-width/2+0.5, height-0.5, -depth/2+0.5); 
            cam1Group.name = "Device:CAM1";
            roomGroup.add(cam1Group);
            
            const cam2Group = new THREE.Group();
            const cam2 = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 4), camMat);
            cam2.rotation.set(Math.PI/4, -Math.PI*3/4, 0); cam2Group.add(cam2);
            cam2Group.position.set(width/2-0.5, height-0.5, depth/2-0.5); 
            cam2Group.name = "Device:CAM2";
            roomGroup.add(cam2Group);

            const tempSensor = new THREE.Mesh(new THREE.SphereGeometry(0.25,8,8), new THREE.MeshBasicMaterial({color:0x00ff88}));
            tempSensor.position.set(-1, height-0.3, 0); 
            tempSensor.name = "Device:TEMP";
            roomGroup.add(tempSensor);
            const smokeSensor = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.1,8), new THREE.MeshBasicMaterial({color:0xdddddd}));
            smokeSensor.position.set(1, height-0.1, 0); 
            smokeSensor.name = "Device:SMOKE";
            roomGroup.add(smokeSensor);
            const co2Sensor = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.1,0.4), new THREE.MeshBasicMaterial({color:0x00aaff}));
            co2Sensor.position.set(0, height-0.1, 1); 
            co2Sensor.name = "Device:CO2";
            roomGroup.add(co2Sensor);

            const cbBox = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.6,0.1), new THREE.MeshBasicMaterial({color:0x888888}));
            const cbZ = isTopRow ? doorWallZ - 0.1 : doorWallZ + 0.1;
            cbBox.position.set(width/3 + 1.2, 1.5, cbZ);
            cbBox.name = "Device:CB";
            roomGroup.add(cbBox);

            return roomGroup;
        }

        function createRestroom(targetGroup, width, height, depth, x, z) {
            const roomGroup = new THREE.Group();
            const geom = new THREE.BoxGeometry(width, height, depth);
            const frame = new THREE.LineSegments(new THREE.EdgesGeometry(geom), new THREE.LineBasicMaterial({color: 0x0055ff, transparent: true, opacity: 0.5}));
            frame.position.y = height / 2;
            roomGroup.add(frame);
            
            const toiletGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.8, 8);
            const toilet = createFurnitureBlock(toiletGeom);
            toilet.position.set(0, 0.4, 0);
            roomGroup.add(toilet);

            roomGroup.position.set(x, 0, z);
            targetGroup.add(roomGroup);
        }

        function createStairs(targetGroup, width, height, depth, x, z, directionZ = 1) {
            const stairGroup = new THREE.Group();
            const halfSteps = 6; 
            const stepH = height / (halfSteps * 2);
            const stepD = depth / halfSteps; 
            const halfWidth = width / 2.2; 
            const solidWallMat = new THREE.MeshBasicMaterial({ color: 0x001122, transparent: true, opacity: 0.4, depthWrite: false });

            for(let i=0; i<halfSteps; i++) {
                const geom = new THREE.BoxGeometry(halfWidth, stepH, stepD);
                const solid = new THREE.Mesh(geom, solidWallMat);
                const frame = new THREE.LineSegments(new THREE.EdgesGeometry(geom), lineMaterial);
                const yPos = i * stepH + stepH/2;
                const zPos = directionZ === 1 ? (i * stepD) - depth/2 + stepD/2 : -(i * stepD) + depth/2 - stepD/2;
                const xPos = -width/2 + halfWidth/2; 
                solid.position.set(xPos, yPos, zPos); frame.position.copy(solid.position);
                stairGroup.add(solid); stairGroup.add(frame);
            }
            const landingGeom = new THREE.BoxGeometry(width, stepH, stepD * 1.5);
            const landingSolid = new THREE.Mesh(landingGeom, solidWallMat);
            const landingFrame = new THREE.LineSegments(new THREE.EdgesGeometry(landingGeom), lineMaterial);
            const landingY = halfSteps * stepH;
            const landingZ = directionZ === 1 ? depth/2 : -depth/2;
            landingSolid.position.set(0, landingY, landingZ); landingFrame.position.copy(landingSolid.position);
            stairGroup.add(landingSolid); stairGroup.add(landingFrame);

            for(let i=0; i<halfSteps; i++) {
                const geom = new THREE.BoxGeometry(halfWidth, stepH, stepD);
                const solid = new THREE.Mesh(geom, solidWallMat);
                const frame = new THREE.LineSegments(new THREE.EdgesGeometry(geom), lineMaterial);
                const yPos = landingY + i * stepH + stepH/2;
                const zPos = directionZ === 1 ? depth/2 - stepD - (i * stepD) : -depth/2 + stepD + (i * stepD);
                const xPos = width/2 - halfWidth/2; 
                solid.position.set(xPos, yPos, zPos); frame.position.copy(solid.position);
                stairGroup.add(solid); stairGroup.add(frame);
            }
            stairGroup.position.set(x, 0, z);
            targetGroup.add(stairGroup);
        }

        function createFloor(typeIdx) {
            const floorGroup = new THREE.Group();
            const buildingWidth = 88; const buildingDepth = 24; const floorHeight = 4;
            
            const floorBase = new THREE.Mesh(new THREE.PlaneGeometry(buildingWidth, buildingDepth), floorMaterial);
            floorBase.rotation.x = -Math.PI/2;
            floorGroup.add(floorBase);
            
            const corridorGeom = new THREE.BoxGeometry(buildingWidth - 4, floorHeight, 6);
            const corridorFrame = new THREE.LineSegments(new THREE.EdgesGeometry(corridorGeom), lineMaterial);
            corridorFrame.position.y = floorHeight/2;
            floorGroup.add(corridorFrame);

            if (typeIdx === 0) {
                const mainDoorGeom = new THREE.BoxGeometry(6, 3, 0.5);
                const mainDoor = new THREE.LineSegments(new THREE.EdgesGeometry(mainDoorGeom), new THREE.LineBasicMaterial({color: 0xffaa00, linewidth: 2}));
                mainDoor.position.set(0, 1.5, buildingDepth/2);
                floorGroup.add(mainDoor);
            }

            createStairs(floorGroup, 6, floorHeight, 8, -39, -7, 1);
            if (typeIdx > 0) createRestroom(floorGroup, 6, floorHeight, 6, -33, -7);
            
            for(let i=0; i<5; i++) {
                const r = createSingleRoom(typeIdx, true); // Top row
                r.position.set(-24 + i*12, 0, -7);
                floorGroup.add(r);
            }

            if (typeIdx > 0) createRestroom(floorGroup, 6, floorHeight, 6, 33, -7);
            createStairs(floorGroup, 6, floorHeight, 8, 39, -7, -1);

            for(let i=0; i<7; i++) {
                const r = createSingleRoom(typeIdx, false); // Bottom row
                r.position.set(-36 + i*12, 0, 7);
                floorGroup.add(r);
            }
            
            return floorGroup;
        }

        function exportGLB(group, filename) {
            const exporter = new GLTFExporter();
            exporter.parse(group, function(gltf) {
                const blob = new Blob([gltf], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.download = filename;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, function(err) { console.error(err); }, { binary: true });
        }

        document.getElementById('btnR1T').onclick = () => exportGLB(createSingleRoom(0, true), 'RoomType1_Left.glb');
        document.getElementById('btnR1B').onclick = () => exportGLB(createSingleRoom(0, false), 'RoomType1_Right.glb');
        document.getElementById('btnR2T').onclick = () => exportGLB(createSingleRoom(1, true), 'RoomType2_Left.glb');
        document.getElementById('btnR2B').onclick = () => exportGLB(createSingleRoom(1, false), 'RoomType2_Right.glb');
        document.getElementById('btnR3T').onclick = () => exportGLB(createSingleRoom(2, true), 'RoomType3_Left.glb');
        document.getElementById('btnR3B').onclick = () => exportGLB(createSingleRoom(2, false), 'RoomType3_Right.glb');
        document.getElementById('btnF1').onclick = () => exportGLB(createFloor(0), 'FloorType1_Ground.glb');
        document.getElementById('btnF2').onclick = () => exportGLB(createFloor(1), 'FloorType2_Middle.glb');
        document.getElementById('btnF3').onclick = () => exportGLB(createFloor(2), 'FloorType3_Top.glb');
    </script>
</body>
</html>
