<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNTU Command Center | Digital Twin v1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #3b82f6;
            --bg: #09090b;
        }
        body { 
            background-color: var(--bg); 
            color: #fafafa; 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
            min-height: 100dvh;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Liquid Glass Refraction */
        .liquid-glass {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .accent-border { border-color: var(--accent); }
        .text-accent { color: var(--accent); }
        
        .log-container::-webkit-scrollbar { width: 2px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); }
        
        /* Tactile Feedback */
        button:active { transform: scale(0.96); }
        button { transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }

        /* HUD Pointer Line */
        #hud-line {
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .bento-slot {
            @apply liquid-glass rounded-[2rem] p-6 overflow-hidden relative;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col gap-6">

    <!-- Header: Asymmetric & Minimal -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-end px-4 gap-4">
        <div>
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter leading-none mb-2">
                CRUZR<span class="text-zinc-500">TWIN</span>
            </h1>
            <p class="text-zinc-500 text-sm uppercase tracking-[0.2em] font-light">Autonomous Intelligence Interface</p>
        </div>
        <div class="flex gap-8 items-center font-mono text-[10px] tracking-widest text-zinc-400">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-zinc-700"></div>
                <span>ROBOT_NODE: <span id="status-text" class="text-zinc-500">OFFLINE</span></span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]"></div>
                <span>AI_ENGINE: <span class="text-blue-500">ACTIVE</span></span>
            </div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <!-- Main Grid: Asymmetric Bento Layout (Variance 8) -->
    <main class="flex-1 grid grid-cols-1 md:grid-cols-12 gap-6 min-h-0">
        
        <!-- 3D Visualization: Large Asymmetric Area -->
        <div class="md:col-span-8 bento-slot !p-0 relative group">
            <div id="three-container" class="w-full h-full cursor-crosshair"></div>
            
            <!-- HUD Overlay -->
            <div id="hud-callout" class="absolute z-20 hidden pointer-events-none">
                <div class="flex items-start">
                    <div class="w-24 h-px bg-red-500 mt-4 origin-left -rotate-45" id="hud-line"></div>
                    <div class="liquid-glass border-red-500/30 p-5 w-72 rounded-3xl">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-bold text-red-500 tracking-[0.2em] uppercase">Target_Locked</span>
                            <div class="w-1.5 h-1.5 bg-red-500 rounded-full animate-ping"></div>
                        </div>
                        <h3 class="text-2xl font-bold mb-1" id="hud-title">---</h3>
                        <p class="text-[10px] text-zinc-400 mb-4 font-mono uppercase" id="hud-status">Anomalous Activity</p>
                        
                        <div class="space-y-3">
                            <div class="p-3 bg-white/5 rounded-2xl">
                                <span class="text-[8px] text-zinc-500 uppercase block mb-1">AI Rationale</span>
                                <span class="text-xs text-white leading-relaxed" id="hud-rationale">Analyzing data patterns...</span>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 bg-white/5 rounded-2xl border border-white/5">
                                    <span class="text-[8px] text-zinc-500 uppercase block mb-1">Heat_Idx</span>
                                    <span class="text-lg font-mono font-bold text-orange-400" id="hud-temp">--.-</span>
                                </div>
                                <div class="p-3 bg-white/5 rounded-2xl border border-white/5">
                                    <span class="text-[8px] text-zinc-500 uppercase block mb-1">CO2_PPM</span>
                                    <span class="text-lg font-mono font-bold text-blue-400" id="hud-co2">----</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="absolute top-6 left-6 pointer-events-none">
                <div class="liquid-glass px-4 py-2 rounded-full flex items-center gap-3">
                    <div class="w-1 h-1 bg-blue-500 rounded-full"></div>
                    <span class="text-[10px] font-mono tracking-tighter" id="robot-coords">00.00, 00.00</span>
                </div>
            </div>
        </div>

        <!-- Log Stream: Packed Cockpit Side (Density 4 but Monospace) -->
        <div class="md:col-span-4 flex flex-col gap-6 min-h-0">
            <div class="flex-1 bento-slot flex flex-col !p-0">
                <div class="flex border-b border-white/5 font-mono text-[9px] uppercase tracking-widest overflow-x-auto">
                    <button onclick="setTab('ai')" id="tab-ai" class="px-6 py-4 border-b-2 border-blue-500 text-blue-500">AI</button>
                    <button onclick="setTab('alerts')" id="tab-alerts" class="px-6 py-4 border-b-2 border-transparent text-zinc-500">Alert</button>
                    <button onclick="setTab('state')" id="tab-state" class="px-6 py-4 border-b-2 border-transparent text-zinc-500">Sys</button>
                    <button onclick="setTab('robot')" id="tab-robot" class="px-6 py-4 border-b-2 border-transparent text-zinc-500">Bot</button>
                    <button onclick="setTab('sensors')" id="tab-sensors" class="px-6 py-4 border-b-2 border-transparent text-zinc-500">IoT</button>
                </div>
                <div id="log-display" class="flex-1 overflow-y-auto p-6 space-y-4 log-container font-mono text-[10px]">
                    <div class="text-zinc-600 italic">Synchronizing log streams...</div>
                </div>
            </div>

            <!-- System Status Bento -->
            <div class="h-48 bento-slot flex flex-col justify-between">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Node Health</span>
                        <div class="flex items-center gap-2 text-emerald-500">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span class="text-xs font-mono font-bold tracking-tighter">LATENCY: 12ms</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Battery</span>
                        <span class="text-3xl font-black font-mono text-blue-500" id="robot-battery">--%</span>
                    </div>
                </div>
                <button onclick="robotCmd('emergency')" class="w-full py-4 bg-red-600 rounded-2xl text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-red-500 shadow-lg shadow-red-900/20">
                    Emergency Evacuation
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- THREE.JS ENGINE ---
        let scene, camera, renderer, robotMarker;
        let roomMeshes = {};
        const container = document.getElementById('three-container');

        function init3D() {
            scene = new THREE.Scene();
            scene.background = null; // Transparent to see background colors if any
            
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            const spotLight = new THREE.SpotLight(0x3b82f6, 1);
            spotLight.position.set(0, 50, 0);
            scene.add(spotLight);

            const grid = new THREE.GridHelper(100, 40, 0x18181b, 0x09090b);
            scene.add(grid);

            // Rooms (Asymmetric Grid Layout)
            roomMeshes["A101"] = createRoom("A101", -20, -10, 16, 16, 0x18181b);
            roomMeshes["A102"] = createRoom("A102", 0, -10, 16, 16, 0x18181b);
            roomMeshes["A103"] = createRoom("A103", 20, -10, 16, 16, 0x18181b);
            roomMeshes["A104"] = createRoom("A104", 40, -10, 16, 16, 0x18181b);

            // Robot (High-Agency Style)
            const botGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 1.8, 6), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            body.position.y = 0.9;
            botGroup.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.4), new THREE.MeshPhongMaterial({ color: 0x18181b }));
            head.position.y = 2.0;
            botGroup.add(head);
            robotMarker = botGroup;
            scene.add(robotMarker);

            camera.position.set(30, 40, 50);
            camera.lookAt(10, 0, -5);

            animate();
        }

        function createRoom(name, x, z, w, d, color) {
            const group = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(w, d), new THREE.MeshPhongMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.5 }));
            floor.rotation.x = Math.PI / 2;
            floor.position.set(x, 0.05, z);
            group.add(floor);

            const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, 4, d));
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x27272a, transparent: true, opacity: 0.3 }));
            line.position.set(x, 2, z);
            group.add(line);
            
            scene.add(group);
            return { floor, line, originalColor: color };
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // --- DASHBOARD CORE ---
        let currentTab = 'ai';

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                btn.classList.remove('border-blue-500', 'text-blue-500');
                btn.classList.add('border-transparent', 'text-zinc-500');
            });
            const active = document.getElementById('tab-' + tab);
            active.classList.add('border-blue-500', 'text-blue-500');
            active.classList.remove('border-transparent', 'text-zinc-500');
            fetchLogs();
        }

        async function fetchLogs() {
            try {
                const response = await fetch(`/api/logs/${currentTab}`);
                const logs = await response.json();
                const display = document.getElementById('log-display');
                display.innerHTML = '';
                
                logs.forEach((log, idx) => {
                    const div = document.createElement('div');
                    div.className = 'opacity-0 animate-in fade-in slide-in-from-right duration-500';
                    div.style.animationDelay = `${idx * 50}ms`;
                    div.style.animationFillMode = 'forwards';
                    
                    const time = log.timestamp?.split('T')[1]?.split('Z')[0] || '--:--:--';
                    let detail = '';
                    
                    if (currentTab === 'ai') {
                        const color = log.predicted_level === 'critical' ? 'text-red-500' : 'text-blue-400';
                        detail = `<span class="${color}">${log.predicted_level?.toUpperCase()}</span> <span class="text-zinc-600">SCORE:</span> ${log.anomaly_score?.toFixed(4)}`;
                    } else if (currentTab === 'alerts') {
                        detail = `<span class="text-red-500 font-bold">ALRT</span> ${log.message}`;
                    } else {
                        detail = `<span class="text-zinc-500">${JSON.stringify(log).substring(0, 40)}...</span>`;
                    }
                    
                    div.innerHTML = `<span class="text-zinc-700 mr-3">${time}</span> ${detail}`;
                    display.appendChild(div);
                });
                
                display.scrollTop = display.scrollHeight;
                update3DState(logs);
            } catch (e) {}
        }

        function update3DState(logs) {
            Object.values(roomMeshes).forEach(r => {
                r.floor.material.color.setHex(r.originalColor);
                r.line.material.color.setHex(0x27272a);
            });

            let anomaly = null;
            logs.forEach(log => {
                if (log.severity === 'critical' || log.predicted_level === 'critical') {
                    const room = (log.location || log.zone_id || '').split('_').pop();
                    if (roomMeshes[room]) {
                        roomMeshes[room].floor.material.color.setHex(0x450a0a);
                        roomMeshes[room].line.material.color.setHex(0xef4444);
                        anomaly = { id: room, log: log };
                    }
                }
            });

            const hud = document.getElementById('hud-callout');
            if (anomaly) {
                const pos = new THREE.Vector3();
                roomMeshes[anomaly.id].floor.getWorldPosition(pos);
                pos.y += 5;
                pos.project(camera);
                
                const x = (pos.x * 0.5 + 0.5) * container.clientWidth;
                const y = (pos.y * -0.5 + 0.5) * container.clientHeight;

                hud.style.left = `${x}px`;
                hud.style.top = `${y}px`;
                hud.classList.remove('hidden');

                document.getElementById('hud-title').innerText = `ZONE_${anomaly.id}`;
                document.getElementById('hud-rationale').innerText = anomaly.log.rationale || anomaly.log.message;
                if (anomaly.log.features) {
                    document.getElementById('hud-temp').innerText = `${anomaly.log.features.temperature?.toFixed(1)}°`;
                    document.getElementById('hud-co2').innerText = anomaly.log.features.co2?.toFixed(0);
                }
            } else {
                hud.classList.add('hidden');
            }
        }

        async function updateStatus() {
            try {
                const res = await fetch('/api/robot/status');
                const s = await res.json();
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                
                if (s.connected) {
                    dot.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                    txt.innerText = 'STABLE';
                    txt.className = 'text-emerald-500';
                    robotMarker.position.x = s.location.x;
                    robotMarker.position.z = s.location.y;
                    document.getElementById('robot-coords').innerText = `${s.location.x.toFixed(2)}, ${s.location.y.toFixed(2)}`;
                } else {
                    dot.className = 'w-1.5 h-1.5 rounded-full bg-zinc-700';
                    txt.innerText = 'OFFLINE';
                    txt.className = 'text-zinc-500';
                }
                document.getElementById('robot-battery').innerText = s.battery + '%';
            } catch (e) {}
        }

        async function robotCmd(action, extra = {}) {
            await fetch('/api/robot/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...extra })
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        init3D();
        setInterval(fetchLogs, 2000);
        setInterval(updateStatus, 1000);
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
        fetchLogs();
    </script>
</body>
</html>
