mqtt:
  broker: "mosquitto"
  port: 1883
  user: ""
  password: ""

devices:
  # Smart Plug A101
  - id: "a3d0b864e934dbef452o4a"
    name: "smart_plug_a101"
    device_id: "smart_plug_a101"
    attrs:
      - cur_power
      - switch_1
  # Smart Plug A102
  - id: "a38764792570512f2fgnnz"
    name: "smart_plug_a102"
    device_id: "smart_plug_a102"
    attrs:
      - cur_power
      - switch_1

  # Smart Plug A103
  - id: "a36c1138920ec8dc84qfqs"
    name: "smart_plug_a103"
    device_id: "smart_plug_a103"
    attrs:
      - cur_power
      - switch_1

  # Smart Plug A104
  - id: "a362ba4e4dd29f17degdum"
    name: "smart_plug_a104"
    device_id: "smart_plug_a104"
    attrs:
      - cur_power
      - switch_1

  # Smart Plug A105
  - id: "a3063b9490f52cf0e5qv2a"
    name: "smart_plug_a105"
    device_id: "smart_plug_a105"
    attrs:
      - cur_power
      - switch_1

  # Smart Plug A106
  - id: "a3575f35c8b04f1642vsfg"
    name: "smart_plug_a106"
    device_id: "smart_plug_a106"
    attrs:
      - cur_power
      - switch_1

  # Audible Alarm A101 (Siren Sensor)
  - id: "a359df88938e2a2223xdwx"
    name: "audible_alarm_a101"
    device_id: "audible_alarm_a101"
    attrs:
      - AlarmSwitch # Bật/tắt còi
      - AlarmType # Loại âm thanh
      - AlarmPeriod # Thời gian kêu
      - BatteryStatus # Trạng thái pin

  # Lock Door A101 (C100-F)
  - id: "a3400b0f1o3q5kji"
    name: "lock_door_a101"
    device_id: "lock_door_a101"
    attrs:
      - manual_lock # Trạng thái khóa
      - battery_state # Pin
      - automatic_lock # Tự động khóa
      - auto_lock_time # Thời gian tự động khóa

tuya:
  region: "sg" # Singapore Data Center (override: TUYA_REGION)
  # key/secret đọc từ .env: TUYA_KEY, TUYA_SECRET

app:
  period: 30 # Lấy dữ liệu mỗi 30 giây
  # Topic IoT Agent JSON: /json/<apikey>/<device_id>/attrs
  topic_status_template: "/json/cruzrtwin2026/{{ device_id }}/attrs"
