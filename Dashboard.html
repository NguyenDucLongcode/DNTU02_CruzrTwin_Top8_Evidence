<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DNTU COMMAND CENTER - DIGITAL TWIN</title>
    <style>
        body { margin: 0; padding: 0; background-color: #020609; color: #0ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* 1. CSS GRID LAYOUT */
        #dashboard-container {
            display: grid;
            grid-template-columns: 22% 58% 20%; 
            height: 100vh; width: 100vw; gap: 10px; padding: 10px; box-sizing: border-box;
            transition: grid-template-columns 0.3s ease;
        }

        .panel {
            background: rgba(0, 15, 25, 0.85); border: 1px solid #0088ff; border-radius: 6px; 
            padding: 15px; box-shadow: 0 0 10px rgba(0, 150, 255, 0.1);
            display: flex; flex-direction: column; position: relative; z-index: 10;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .panel.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

        h2, h3 { margin: 0 0 15px 0; border-bottom: 2px solid #0088ff; padding-bottom: 10px; color: #fff; text-transform: uppercase; font-size: 15px; letter-spacing: 1px;}
        .section-title { font-size: 11px; color: #88ccff; text-transform: uppercase; margin: 15px 0 5px 0; font-weight: bold; }
        
        button { 
            width: 100%; padding: 10px; margin-bottom: 8px; background: #002244; color: #0ff; 
            border: 1px solid #0088ff; cursor: pointer; transition: all 0.2s; font-weight: bold; border-radius: 4px;
        }
        button:hover { background: #0088ff; color: #fff; }
        button.active { background: #00ff88; color: #000; border-color: #00ff88; }
        select, input[type="range"] { width: 100%; padding: 8px; background: #001122; color: #0ff; border: 1px solid #0088ff; border-radius: 4px; cursor: pointer; box-sizing: border-box;}
        .slider-group { margin-bottom: 10px; }
        .slider-group label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }

        /* Khung 3D */
        #viewport-container { position: relative; border: 1px solid #0088ff; border-radius: 6px; overflow: hidden; background: #000; display: flex; flex-direction: column;}
        canvas { display: block; width: 100%; height: 100%; outline: none; }

        /* Nút thu gọn giao diện */
        #btn-toggle-ui { position: absolute; top: 15px; right: 15px; z-index: 50; width: auto; padding: 5px 15px; background: rgba(0, 136, 255, 0.3); border-color: #0088ff; }

        /* Panel Cột Phải (Logs) - Đã sửa lỗi không cuộn được chuột */
        #right-panel { overflow: hidden; } /* Chặn overflow panel gốc */
        #log-container { 
            flex: 1; overflow-y: auto; font-family: 'Courier New', Courier, monospace; 
            font-size: 12px; background: #000; padding: 10px; border: 1px solid #004466; scroll-behavior: smooth;
            pointer-events: auto; /* Cho phép lăn chuột */
        }
        
        /* Ẩn thanh cuộn tàng hình để đẹp hơn */
        #log-container::-webkit-scrollbar { width: 6px; }
        #log-container::-webkit-scrollbar-thumb { background: #0088ff; border-radius: 3px; }

        .log-entry { margin-bottom: 6px; border-bottom: 1px dashed #002233; padding-bottom: 4px; line-height: 1.4; word-wrap: break-word;}
        .log-time { color: #88ccff; }
        .log-critical { color: #ff0044; font-weight: bold; }
        .log-info { color: #00ff88; }

        /* HOVER TOOLTIP */
        #hover-tooltip {
            position: absolute; display: none; background: rgba(0, 20, 30, 0.95); 
            border: 1px solid #00ff88; padding: 10px; border-radius: 4px;
            color: #fff; font-size: 12px; z-index: 2000; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,255,136,0.3);
        }
        #hover-tooltip span { color: #00ff88; font-weight: bold; font-size: 14px;}

        /* BẢNG CẢNH BÁO NHỎ (Gắn với Phòng 3D) */
        #critical-popup {
            display: none; position: absolute; top: 0; left: 0; transform: translate(-50%, -100%);
            width: 280px; background: rgba(30, 0, 0, 0.9); border: 1px solid #ff0044;
            border-radius: 6px; z-index: 3000; box-shadow: 0 0 20px rgba(255, 0, 68, 0.5);
            padding: 10px; color: #fff; margin-top: -30px; pointer-events: none;
            transition: left 0.1s linear, top 0.1s linear; /* Mượt mà di chuyển */
        }
        #critical-popup::after {
            content: ''; position: absolute; top: 100%; left: 50%; margin-left: -8px;
            border-width: 8px; border-style: solid; border-color: #ff0044 transparent transparent transparent;
        }
        #critical-popup h2 { color: #ff0044; text-align: center; border-bottom: 1px solid #ff0044; font-size: 12px; margin: 0 0 8px 0; animation: blink 1s infinite; padding-bottom: 5px;}
        .popup-logs { font-family: monospace; font-size: 11px; color: #ffaa00; line-height: 1.4;}

        #sync-badge { position: absolute; top: 15px; left: 15px; background: rgba(0, 255, 136, 0.2); border: 1px solid #00ff88; color: #00ff88; padding: 5px 10px; font-size: 11px; font-weight: bold; border-radius: 20px; animation: pulse 2s infinite; z-index: 50; pointer-events: none;}

        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes pulse { 50% { box-shadow: 0 0 10px #00ff88; } }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    
    <!-- Hover Tooltip -->
    <div id="hover-tooltip">
        ID: <b id="tt-id" style="color:#0ff">--</b><br>
        Room: <b id="tt-room">--</b><br>
        Data: <span id="tt-val">--</span>
    </div>

    <!-- Bảng Cảnh Báo Bám Vị Trí -->
    <div id="critical-popup">
        <h2>⚠️ ALARM: ROOM <span id="alert-room-id"></span></h2>
        <div id="popup-iot-logs" class="popup-logs"></div>
    </div>

    <div id="dashboard-container">
        
        <!-- CỘT TRÁI -->
        <div class="panel" id="left-panel">
            <h2>⚙️ COMMAND CENTER</h2>
            <div style="display: flex; gap: 5px;">
                <button id="btn-3d" class="active" style="flex:1">🌐 3D Overview</button>
                <button id="btn-2d" style="flex:1">📐 2D Top-Down</button>
            </div>
            
            <div class="section-title">Isolate Room</div>
            <select id="isolateSelect"><option value="ALL">Show Full Campus</option></select>
            
            <h2 style="margin-top:20px;">📡 IOT CONTROLS</h2>
            <p style="font-size:11px; color:#aaa; margin:0 0 10px 0;">Push simulated data to Docker Orion.</p>
            <div class="slider-group"><label>Temperature: <span id="val-temp" style="color:#00ff88">25 °C</span></label><input type="range" id="sl-temp" min="16" max="60" value="25"></div>
            <div class="slider-group"><label>Smoke Density: <span id="val-smoke" style="color:#00ff88">0 %</span></label><input type="range" id="sl-smoke" min="0" max="100" value="0"></div>
            <div class="slider-group"><label>CO2 Level: <span id="val-co2" style="color:#00ff88">400 ppm</span></label><input type="range" id="sl-co2" min="300" max="2000" value="400"></div>
            <div id="be-status" style="font-size:11px; color:#00ff88; margin-top:10px; text-align:center;">[Backend Link: READY]</div>
        </div>

        <!-- CỘT GIỮA -->
        <div id="viewport-container">
            <div id="sync-badge">🔴 DOCKER SYNC ACTIVE</div>
            <button id="btn-toggle-ui">👁️ Hide Panels</button>
            <canvas id="main-canvas"></canvas>
        </div>

        <!-- CỘT PHẢI (LOGS) -->
        <div class="panel" id="right-panel">
            <h2>📋 LIVE IoT TELEMETRY</h2>
            <p style="font-size:11px; color:#aaa; margin:0 0 10px 0;">Auto-scrolling sensor data stream.</p>
            <div id="log-container"></div>
        </div>

    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // 1. ENGINE & CẤU HÌNH CAMERA
        // ==========================================
        const container = document.getElementById('viewport-container');
        const canvas = document.getElementById('main-canvas');
        const dashboardGrid = document.getElementById('dashboard-container');
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020609, 0.005);

        const aspect = container.clientWidth / container.clientHeight;
        const perspectiveCamera = new THREE.PerspectiveCamera(50, aspect, 0.1, 3000);
        perspectiveCamera.position.set(120, 100, 160);

        const viewSize = 140; 
        const orthoCamera = new THREE.OrthographicCamera( -viewSize * aspect / 2, viewSize * aspect / 2, viewSize / 2, -viewSize / 2, 0.1, 2000 );
        orthoCamera.position.set(0, 200, 0); 
        orthoCamera.lookAt(0, 0, 0);

        let activeCamera = perspectiveCamera;

        // Bật depth Buffer để render mượt hơn, giảm Z-fighting
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x020609, 1);

        const orbitControls = new OrbitControls(perspectiveCamera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.target.set(0, 10, 0);
        
        let is2DMode = false;
        let activeAlertRoom = null; 
        let uiHidden = false;

        const btn3D = document.getElementById('btn-3d');
        const btn2D = document.getElementById('btn-2d');
        const isolateSelect = document.getElementById('isolateSelect');

        document.getElementById('btn-toggle-ui').addEventListener('click', () => {
            uiHidden = !uiHidden;
            document.getElementById('left-panel').classList.toggle('hidden', uiHidden);
            document.getElementById('right-panel').classList.toggle('hidden', uiHidden);
            
            if(uiHidden) {
                dashboardGrid.style.gridTemplateColumns = '0% 100% 0%';
                document.getElementById('btn-toggle-ui').innerText = "👁️ Show Panels";
            } else {
                dashboardGrid.style.gridTemplateColumns = '22% 58% 20%';
                document.getElementById('btn-toggle-ui').innerText = "👁️ Hide Panels";
            }
            setTimeout(() => window.dispatchEvent(new Event('resize')), 350); // Cập nhật lại canvas
        });

        // ==========================================
        // 2. DỰNG MÔ HÌNH CHUẨN XÁC (FIX Z-FIGHTING)
        // ==========================================
        const campusGroup = new THREE.Group();
        scene.add(campusGroup);
        const roomObjects = {}; 
        const floorGroups = []; 
        const sensors = [];
        const roomRegistry = {};

        const floorHeight = 4;
        const totalFloors = 5;
        const bWidth = 104; 
        const bDepth = 24;

        // Xóa depthWrite:false để sửa lỗi tàng hình/nhấp nháy ở 2D mode
        const matWall = new THREE.MeshBasicMaterial({ color: 0x002233, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const matEdge = new THREE.LineBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.8 });
        const matFloor = new THREE.MeshBasicMaterial({ color: 0x001122 });
        const furnEdgeMat = new THREE.LineBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.5 });
        const doorMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.5, side: THREE.DoubleSide });

        function createSolidWall(w, d, x, z, parentGroup) {
            const geom = new THREE.BoxGeometry(w, floorHeight, d);
            const wall = new THREE.Mesh(geom, matWall);
            const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geom), matEdge);
            wall.position.set(x, floorHeight/2, z);
            edges.position.copy(wall.position);
            parentGroup.add(wall); parentGroup.add(edges);
        }

        // Bỏ qua nội thất siêu chi tiết cho màn hình tổng quan để mượt, thay bằng khối hộp tượng trưng
        function addStandardClassroom(roomGroup, width, depth) {
            const deskGroup = new THREE.Group();
            [-1.5, 1.5].forEach(z => {
                for(let i = 0; i < 4; i++) {
                    const x = -3 + i * 2; 
                    const desk = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.4, 0.8), new THREE.MeshBasicMaterial({color: 0x004455}));
                    desk.position.set(x, 0.2, z);
                    deskGroup.add(desk);
                }
            });
            roomGroup.add(deskGroup);
        }

        function createDoor(w, h, x, z, isTopRow, roomTargetGroup) {
            const geom = new THREE.BoxGeometry(w, h, 0.2);
            const mesh = new THREE.Mesh(geom, doorMat);
            mesh.position.set(x, h/2, z); 
            roomTargetGroup.add(mesh); 
        }

        function createStairs(targetGroup, width, height, depth, x, z, directionZ = 1) {
            const stairGroup = new THREE.Group();
            for(let i=0; i<6; i++) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(3, 4/12, 8/6), matWall);
                wall.position.set(x - 1.5, i*(4/12) + (4/12)/2, z + (directionZ === 1 ? (i*8/6 - 4) : (-i*8/6 + 4)));
                stairGroup.add(wall);
            }
            targetGroup.add(stairGroup);
        }

        function addIoTDevice(type, x, z, roomId, parent) {
            let geom, color, unit, fiwareId;
            if(type === 'TEMP') { geom = new THREE.SphereGeometry(0.3, 8, 8); color = 0x00ff88; unit = '°C'; fiwareId = `Device:TEMP_${roomId}`; }
            if(type === 'SMOKE') { geom = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 8); color = 0x00ff88; unit = 'Status'; fiwareId = `Device:SMOKE_${roomId}`; }
            if(type === 'CO2') { geom = new THREE.BoxGeometry(0.4, 0.1, 0.4); color = 0x00ff88; unit = 'ppm'; fiwareId = `Device:AIR_${roomId}`; }

            const mat = new THREE.MeshBasicMaterial({color: color});
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, floorHeight - 0.2, z);
            mesh.userData = { isSensor: true, id: fiwareId, type: type, room: roomId, value: 0, unit: unit, baseMat: mat };
            parent.add(mesh);
            sensors.push(mesh);
        }

        function buildRoom(roomId, x, z, w, d, isTopRow, parentGroup, fIdx) {
            const roomGroup = new THREE.Group();
            
            createSolidWall(1, d, x + w/2, z, roomGroup);
            const wallZ = isTopRow ? z + d/2 : z - d/2;
            createSolidWall(w - 2, 1, x - 1, wallZ, roomGroup);
            createDoor(2, 3, x + w/2 - 1, wallZ, isTopRow, roomGroup);

            addStandardClassroom(roomGroup, w, d);

            addIoTDevice('TEMP', x - 2, z, roomId, roomGroup);
            addIoTDevice('SMOKE', x, z, roomId, roomGroup);
            addIoTDevice('CO2', x + 2, z, roomId, roomGroup);

            parentGroup.add(roomGroup);
            roomObjects[roomId] = roomGroup;
            roomRegistry[roomId] = { floor: fIdx, group: roomGroup, x: x, z: z, baseMat: matWall.clone() };
            roomGroup.children[0].material = roomRegistry[roomId].baseMat;

            const opt = document.createElement('option');
            opt.value = roomId; opt.textContent = `L${fIdx+1} - ${roomId}`;
            isolateSelect.appendChild(opt);
        }

        // Xây dựng 5 Tầng
        for (let f = 0; f < totalFloors; f++) {
            const fGroup = new THREE.Group();
            fGroup.position.y = f * floorHeight;

            const fMesh = new THREE.Mesh(new THREE.PlaneGeometry(bWidth, bDepth), matFloor);
            fMesh.rotation.x = -Math.PI / 2;
            fGroup.add(fMesh);
            
            if (f === 0) {
                createSolidWall(bWidth/2 - 3, 1, -bWidth/4 - 1.5, 11.5, fGroup); 
                createSolidWall(bWidth/2 - 3, 1, bWidth/4 + 1.5, 11.5, fGroup);
                createDoor(3, 3, -3, 11.5, false, fGroup); createDoor(3, 3, 3, 11.5, false, fGroup); 
            } else {
                createSolidWall(bWidth, 1, 0, 11.5, fGroup); 
            }
            
            createStairs(fGroup, 6, floorHeight, 8, -47, -7, 1);
            [-35, -25, -15, -5, 5, 15, 25, 35].forEach((x, i) => buildRoom(`A10${i+1}`, x, -7, 10, 8, true, fGroup, f));
            createStairs(fGroup, 6, floorHeight, 8, 47, -7, -1);

            [-45, -35, -25, -15, -5, 5, 15, 25, 35, 45].forEach((x, i) => buildRoom(`B10${i+1}`, x, 7, 10, 8, false, fGroup, f));

            campusGroup.add(fGroup);
            floorGroups.push(fGroup);
        }


        // ==========================================
        // 3. UI CONTROLS & CAMERA MODES
        // ==========================================
        btn3D.addEventListener('click', () => {
            is2DMode = false;
            btn3D.className = 'active'; btn2D.className = '';
            floorGroups.forEach(g => g.visible = true);
            activeCamera = perspectiveCamera; orbitControls.object = perspectiveCamera; orbitControls.enableRotate = true;
        });

        btn2D.addEventListener('click', () => {
            is2DMode = true;
            btn2D.className = 'active'; btn3D.className = '';
            floorGroups.forEach((g, idx) => { g.visible = (idx === totalFloors - 1); });
            activeCamera = orthoCamera; orbitControls.object = orthoCamera;
            orbitControls.enableRotate = false; orbitControls.target.set(0, totalFloors * floorHeight, 0);
        });

        isolateSelect.addEventListener('change', (e) => {
            const selected = e.target.value;
            if (selected === "ALL") { btn3D.click(); return; }
            floorGroups.forEach(g => g.visible = false);
            Object.values(roomObjects).forEach(g => g.visible = false);
            
            const roomInfo = roomRegistry[selected];
            floorGroups[roomInfo.floor].visible = true;
            roomObjects[selected].visible = true;
            
            activeCamera = perspectiveCamera; orbitControls.object = perspectiveCamera; orbitControls.enableRotate = true;
            activeCamera.position.set(roomInfo.x, roomInfo.floor * floorHeight + 10, roomInfo.z + 15);
            orbitControls.target.set(roomInfo.x, roomInfo.floor * floorHeight, roomInfo.z);
        });

        // ==========================================
        // 4. RAYCASTER (HOVER TOOLTIP)
        // ==========================================
        const raycaster = new THREE.Raycaster();
        const tooltip = document.getElementById('hover-tooltip');

        document.getElementById('viewport-container').addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const mouse = new THREE.Vector2( ((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1 );
            raycaster.setFromCamera(mouse, activeCamera);

            const sensorIntersects = raycaster.intersectObjects(sensors, false);
            if (sensorIntersects.length > 0 && sensorIntersects[0].distance < 300) {
                const data = sensorIntersects[0].object.userData;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.innerHTML = `ID: <span>${data.id}</span><br>Room: <b>${data.room}</b><br>Value: <b style="color:#fff">${data.value} ${data.unit}</b>`;
            } else {
                tooltip.style.display = 'none';
            }
        });

        // ==========================================
        // 5. IOT SIMULATOR & DOCKER FIWARE SYNC
        // ==========================================
        const slTemp = document.getElementById('sl-temp');
        const slSmoke = document.getElementById('sl-smoke');
        const slCo2 = document.getElementById('sl-co2');
        const valTemp = document.getElementById('val-temp');
        const valSmoke = document.getElementById('val-smoke');
        const valCo2 = document.getElementById('val-co2');
        const beStatus = document.getElementById('be-status');
        
        const logContainer = document.getElementById('log-container');
        function addIoTLog(roomId, msg, isCrit) {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span class="log-time">[${time}]</span> <span class="${isCrit?'log-critical':'log-info'}">[FIWARE] ${roomId}: ${msg}</span>`;
            logContainer.appendChild(div);
            // Sửa lỗi cuộn chuột
            setTimeout(() => { logContainer.scrollTop = logContainer.scrollHeight; }, 50);
        }

        const alertPopup = document.getElementById('critical-popup');
        const popupLogs = document.getElementById('popup-iot-logs');
        
        function updateRoomColor(roomId, t, s, c) {
            const rData = roomRegistry[roomId];
            if(!rData) return;

            const tSens = sensors.find(sen => sen.userData.room === roomId && sen.userData.type === 'TEMP');
            const sSens = sensors.find(sen => sen.userData.room === roomId && sen.userData.type === 'SMOKE');
            const cSens = sensors.find(sen => sen.userData.room === roomId && sen.userData.type === 'CO2');
            
            if(tSens) { tSens.userData.value = t; tSens.userData.baseMat.color.setHex(t > 35 ? 0xff0000 : 0x00ff88); }
            if(sSens) { sSens.userData.value = s == 1 ? 'DETECTED' : 'CLEAR'; sSens.userData.baseMat.color.setHex(s == 1 ? 0xff0000 : 0x00ff88); }
            if(cSens) { cSens.userData.value = c; cSens.userData.baseMat.color.setHex(c > 800 ? 0xff0000 : 0x00ff88); }

            let isCrit = (t > 45 || s == 1 || c > 1000);
            rData.baseMat.color.setHex(isCrit ? 0xff0000 : 0x002233);
            rData.baseMat.opacity = isCrit ? 0.9 : 0.6; // Tăng opacity tường để nổi rõ hơn

            // Chỉ popup phòng đang được chọn bị cháy (để tránh popup loạn xạ)
            if(isCrit && (isolateSelect.value === 'ALL' || isolateSelect.value === roomId)) {
                triggerAlertPopup(roomId, t, s, c);
            } else if (activeAlertRoom === roomId && !isCrit) { 
                activeAlertRoom = null; alertPopup.style.display = 'none'; 
            }
        }

        function triggerAlertPopup(roomId, t, s, c) {
            activeAlertRoom = roomId; 
            document.getElementById('alert-room-id').innerText = roomId;
            popupLogs.innerHTML = `TEMP: ${t}°C | CO2: ${c} | SMOKE: ${s==1?'YES':'NO'}<br>> AI Engine Anomaly Score: -1<br>> Action: Routing Robot to ${roomId}`;
            alertPopup.style.display = 'block';
            addIoTLog(roomId, `CRITICAL LIMIT EXCEEDED`, true);
        }

        // --- ĐÂY LÀ HÀM KẾT NỐI VỚI DOCKER ĐÍCH THỰC (CỔNG 1026) ---
        async function fetchLiveDockerData() {
            try {
                // Đọc trực tiếp từ FIWARE (Yêu cầu Docker đã mở port 1026)
                const res = await fetch(`http://localhost:1026/v2/entities?options=keyValues`);
                if (!res.ok) return;
                const entities = await res.json();
                
                beStatus.innerText = "[Docker Polling: SUCCESS]";
                beStatus.style.color = "#00ff88";

                // Map dữ liệu Docker lên Web
                entities.forEach(entity => {
                    // Cắt chuỗi lấy Room ID (Ví dụ: "Device:TEMP_A101" -> "A101")
                    const parts = entity.id.split('_');
                    if (parts.length < 2) return;
                    const roomId = parts[1];
                    const rData = roomRegistry[roomId];
                    if (!rData) return;

                    // Giữ lại các giá trị cũ
                    let t = rData.temp || 25, s = rData.smoke || 0, c = rData.co2 || 400;

                    if (entity.type === 'TemperatureSensor' && entity.temperature) t = entity.temperature;
                    if (entity.type === 'SmokeDetector' && entity.smoke_status !== undefined) s = entity.smoke_status;
                    if (entity.type === 'AirQualitySensor' && entity.co2) c = entity.co2;

                    // Lưu vào ram
                    rData.temp = t; rData.smoke = s; rData.co2 = c;
                    
                    updateRoomColor(roomId, t, s, c);
                    addIoTLog(roomId, `Received Temp:${t}, CO2:${c}`, false);
                });
            } catch(e) {
                // Nếu Docker đang tắt, Dashboard sẽ âm thầm chờ mà không crash
                beStatus.innerText = "[Docker Polling: WAITING FOR DOCKER...]";
                beStatus.style.color = "#ffaa00";
            }
        }
        // Gọi polling 2 giây 1 lần
        setInterval(fetchLiveDockerData, 2000);

        async function pushDataToDocker(roomId, temp, smoke, co2) {
            try {
                // Đẩy thông số từ Slider ngược lại cho FIWARE
                await fetch(`http://localhost:1026/v2/entities/Room:${roomId}/attrs`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "temperature": { "value": temp, "type": "Number" },
                        "smoke_status": { "value": smoke, "type": "Number" },
                        "co2": { "value": co2, "type": "Number" }
                    })
                });
                addIoTLog(roomId, `Pushed to Docker: Temp=${temp}, CO2=${co2}`, false);
            } catch(e) {
                addIoTLog("SYSTEM", "Docker is offline. Simulated data mapped locally.", false);
            }
        }

        function onSliderChange() {
            const room = isolateSelect.value === 'ALL' ? 'A101' : isolateSelect.value;
            const t = parseFloat(slTemp.value);
            const s = parseInt(slSmoke.value);
            const c = parseInt(slCo2.value);

            valTemp.innerText = `${t} °C`; valTemp.style.color = t > 35 ? '#ff0000' : '#00ff88';
            valSmoke.innerText = `${s} %`; valSmoke.style.color = s > 50 ? '#ff0000' : '#00ff88';
            valCo2.innerText = `${c} ppm`; valCo2.style.color = c > 800 ? '#ff0000' : '#00ff88';

            let smokeStatus = s > 60 ? 1 : 0;
            updateRoomColor(room, t, smokeStatus, c);
            pushDataToDocker(room, t, smokeStatus, c); 
        }

        slTemp.addEventListener('change', onSliderChange);
        slSmoke.addEventListener('change', onSliderChange);
        slCo2.addEventListener('change', onSliderChange);


        // ==========================================
        // 7. RENDER LOOP & TRACKING MATH (SỬA LỖI ĐỘ LỆCH POPUP)
        // ==========================================
        const tmpVector = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            if (!is2DMode) {
                campusGroup.rotation.y = Math.sin(Date.now() * 0.0001) * 0.1;
                orbitControls.update();
            } else {
                campusGroup.rotation.y = 0; 
                orbitControls.update();
            }

            // --- TRACKING POPUP CHUẨN XÁC BẰNG getWorldPosition ---
            if (activeAlertRoom && alertPopup.style.display === 'block') {
                const rGroup = roomRegistry[activeAlertRoom].group;
                
                // 1. Lấy vị trí World thực sự của tâm phòng (Bỏ qua mọi phép xoay phức tạp)
                rGroup.getWorldPosition(tmpVector);
                // 2. Cộng thêm độ cao y của tòa nhà và nâng lên trên trần nhà
                tmpVector.y += floorHeight + 2; 
                
                // 3. Project ra 2D Screen
                tmpVector.project(activeCamera);

                const rect = container.getBoundingClientRect();
                const x = (tmpVector.x *  .5 + .5) * rect.width;
                const y = (tmpVector.y * -.5 + .5) * rect.height;

                alertPopup.style.left = (rect.left + x) + 'px';
                alertPopup.style.top = (rect.top + y) + 'px';
            }

            renderer.render(scene, activeCamera);
        }

        window.addEventListener('resize', () => {
            const aspect = container.clientWidth / container.clientHeight;
            perspectiveCamera.aspect = aspect; perspectiveCamera.updateProjectionMatrix();
            orthoCamera.left = -viewSize * aspect / 2; orthoCamera.right = viewSize * aspect / 2;
            orthoCamera.top = viewSize / 2; orthoCamera.bottom = -viewSize / 2; orthoCamera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        addIoTLog("SYSTEM", "Initialized. Connecting to Docker...", false);
        animate();
    </script>
</body>
</html>
