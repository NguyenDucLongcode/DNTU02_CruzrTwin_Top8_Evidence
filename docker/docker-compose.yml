name: dntu02-cruzrtwin

services:
  # ============================================================
  # MONGODB - Database cho Orion và IoT Agent
  # ============================================================
  mongo:
    image: mongo:4.4
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - cruzrtwin_mongo_data:/data/db
    networks:
      - fiware-net

  # ============================================================
  # ORION CONTEXT BROKER - Quản lý ngữ cảnh
  # ============================================================
  orion:
    image: fiware/orion:3.10.0
    container_name: orion
    restart: always
    depends_on:
      - mongo
    ports:
      - "1026:1026"
    command: -dbhost mongo -logLevel DEBUG
    networks:
      - fiware-net

  # ============================================================
  # MQTT BROKER - Mosquitto
  # ============================================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - fiware-net

  # ============================================================
  # FIWARE IoT AGENT JSON - Thay thế cho FIMAT
  # ============================================================
  iot-agent:
    image: fiware/iotagent-json:1.26.0
    container_name: iot-agent
    restart: always
    depends_on:
      - mongo
      - orion
      - mosquitto
    ports:
      - "4041:4041" # API đăng ký device (Northbound)
    environment:
      # Orion connection
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026

      # Northbound API
      - IOTA_NORTH_PORT=4041

      # MongoDB configuration
      - IOTA_MONGO_HOST=mongo
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentjson

      # HTTP Southbound
      - IOTA_HTTP_PORT=7896

      # MQTT configuration
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883

      # Default configuration
      - IOTA_DEFAULT_RESOURCE=/iot/json
      - IOTA_DEFAULT_TRANSPORT=MQTT
      - IOTA_PROVIDER_URL=http://iot-agent:4041

      # Logging
      - IOTA_LOG_LEVEL=DEBUG
    networks:
      - fiware-net

  # ============================================================
  # FIWARE DEVICE SIMULATOR
  # ============================================================
  device-simulator:
    image: fiware/device-simulator:latest
    container_name: device-simulator
    restart: "no" # Chạy 1 lần, không tự restart
    depends_on:
      - mosquitto
      - iot-agent
      - orion
    volumes:
      - ./simulator/config:/app/config # Mount thư mục cấu hình
    working_dir: /app
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ORION_HOST=orion
      - ORION_PORT=1026
    command: >
      sh -c "mkdir -p /app/config && 
             while [ ! -f /app/config/simulation.json ]; do 
               echo 'Waiting for config file...'; 
               sleep 2; 
             done && 
             /opt/fiware-device-simulator/bin/fiwareDeviceSimulatorCLI -c /app/config/simulation.json"
    networks:
      - fiware-net

  # ============================================================
  # DASHBOARD WEB - Node.js 3D View
  # ============================================================
  dashboard-web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dashboard-web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
    networks:
      - fiware-net
    depends_on:
      - mongo

volumes:
  cruzrtwin_mongo_data:
networks:
  fiware-net:
    driver: bridge
