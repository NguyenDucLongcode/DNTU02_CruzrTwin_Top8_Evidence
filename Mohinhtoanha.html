<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DNTU X-Ray Digital Twin - Final Architecture</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020609; color: #00ffff; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        .hud-panel {
            position: absolute; 
            background: rgba(0, 20, 30, 0.8);
            padding: 15px;
            border: 1px solid #00ffff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            z-index: 10;
        }
        #ui { top: 20px; left: 20px; text-shadow: 0 0 8px #00ffff; pointer-events: none; }
        
        #iot-controls { top: 20px; right: 20px; width: 280px; }
        #iot-controls h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #00ffff; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; }
        select, input[type="range"], button { width: 100%; margin-top: 5px; background: #002233; color: #0ff; border: 1px solid #0ff; padding: 5px; }
        button { cursor: pointer; transition: 0.2s; font-weight: bold; margin-top: 15px; }
        button:hover { background: #00ffff; color: #000; }
        
        .alert { color: #ff0044; font-weight: bold; animation: blink 0.8s infinite; text-shadow: 0 0 15px red; }
        @keyframes blink { 50% { opacity: 0.2; } }
        .grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background-image: linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <div id="ui" class="hud-panel">
        <strong>DNTU DIGITAL TWIN</strong><br>
        [IoT REAL-TIME SYNC]<br>
        -------------------------<br>
        BUILDING: NHA F<br>
        SENSORS: 600/600 Active<br>
        -------------------------<br>
        SYSTEM: <span id="sys-status">NORMAL</span>
    </div>

    <div id="iot-controls" class="hud-panel">
        <h3>📡 IoT SIMULATOR</h3>
        <div class="control-group">
            <label>Select Room (Camera will focus):</label>
            <select id="roomSelect"></select>
            <label style="display:block; margin-top:5px; cursor:pointer; color:#00ff88;">
                <input type="checkbox" id="isolateMode"> Isolate Selected Room
            </label>
        </div>
        
        <div class="control-group">
            <label>Temperature: <span id="tempValue" style="font-weight:bold; font-size:16px; color:#ffcc00">25</span>°C</label>
            <input type="range" id="tempSlider" min="16" max="60" value="25">
        </div>

        <div class="control-group">
            <label>Smoke Level: <span id="smokeValue" style="font-weight:bold; font-size:16px; color:#cccccc">10</span>%</label>
            <input type="range" id="smokeSlider" min="0" max="100" value="10">
        </div>
        
        <button id="btnSimulate" style="display:none;">Randomize All Sensors</button>
        <button id="btnExport" style="background:#0055aa; color:#fff; margin-top:10px;">⬇️ Download as GLB</button>
        <div style="margin-top: 10px; font-size: 12px; color: #00ff88; text-align: center;">🟢 Live Syncing w/ MongoDB</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        const roomRegistry = {}; 

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020609, 0.005);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 80, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x020609, 1);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;
        controls.target.set(0, 10, 0); // Focus vào giữa tòa nhà lúc đầu

        // 2. MATERIALS
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const floorMaterial = new THREE.MeshBasicMaterial({ color: 0x003355, transparent: true, opacity: 0.3, depthWrite: false });
        
        const furnEdgeMat = new THREE.LineBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.5 });
        const furnSolidMat = new THREE.MeshBasicMaterial({ color: 0x002211, transparent: true, opacity: 0.6 });
        const tvMat = new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.8 });
        const tvScreenMat = new THREE.MeshBasicMaterial({ color: 0x0044ff, transparent: true, opacity: 0.5 });
        const doorMat = new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8 });

        const exteriorGlassMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.03, depthWrite: false, side: THREE.DoubleSide });
        const exteriorEdgeMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const balconyMat = new THREE.MeshBasicMaterial({ color: 0xff2244, transparent: true, opacity: 0.2, depthWrite: false, blending: THREE.AdditiveBlending });

        const campusGroup = new THREE.Group();

        function createFurnitureBlock(geom) {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(geom, furnSolidMat));
            group.add(new THREE.LineSegments(new THREE.EdgesGeometry(geom), furnEdgeMat));
            return group;
        }

        function addRoundTables(roomGroup, width, depth) {
            const tableGeom = new THREE.CylinderGeometry(1.2, 1.2, 0.5, 8);
            for(let x = -width/2 + 3; x <= width/2 - 3; x += 4) {
                for(let z = -depth/2 + 2; z <= depth/2 - 2; z += 4) {
                    const table = createFurnitureBlock(tableGeom);
                    table.position.set(x, 0.25, z);
                    roomGroup.add(table);
                }
            }
        }

        function addStandardClassroom(roomGroup, width, depth) {
            const deskGeom = new THREE.BoxGeometry(2, 0.6, 1);
            [-1.5, 1.5].forEach(z => {
                for(let i = 0; i < 4; i++) {
                    const x = -3 + i * 2; 
                    const desk = createFurnitureBlock(deskGeom);
                    desk.position.set(x, 0.3, z);
                    roomGroup.add(desk);
                }
            });
        }

        function addFourRowClassroom(roomGroup, width, depth) {
            const deskGeom = new THREE.BoxGeometry(1.2, 0.5, 0.8);
            const chairGeom = new THREE.BoxGeometry(0.4, 0.4, 0.4); 
            for(let x = -width/2 + 2.5; x <= width/2 - 2.5; x += 2) {
                let d1 = createFurnitureBlock(deskGeom); d1.position.set(x, 0.25, -2.8);
                let c1 = createFurnitureBlock(chairGeom); c1.position.set(x, 0.2, -2.1);
                roomGroup.add(d1); roomGroup.add(c1);

                let d2 = createFurnitureBlock(deskGeom); d2.position.set(x, 0.25, -0.8);
                let c2 = createFurnitureBlock(chairGeom); c2.position.set(x, 0.2, -1.5);
                roomGroup.add(d2); roomGroup.add(c2);

                let d3 = createFurnitureBlock(deskGeom); d3.position.set(x, 0.25, 0.8);
                let c3 = createFurnitureBlock(chairGeom); c3.position.set(x, 0.2, 1.5);
                roomGroup.add(d3); roomGroup.add(c3);

                let d4 = createFurnitureBlock(deskGeom); d4.position.set(x, 0.25, 2.8);
                let c4 = createFurnitureBlock(chairGeom); c4.position.set(x, 0.2, 2.1);
                roomGroup.add(d4); roomGroup.add(c4);
            }
        }

        function addTV(roomGroup, width, height, depth) {
            const tvGroup = new THREE.Group();
            const tvGeom = new THREE.BoxGeometry(0.2, 1.5, 2.5); 
            const tv = new THREE.Mesh(tvGeom, tvMat);
            const screen = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.3, 2.3), tvScreenMat);
            tvGroup.add(tv);
            tvGroup.add(screen);
            tvGroup.position.set(width/2 - 0.2, height/2 + 0.5, 0);
            roomGroup.add(tvGroup);
        }

        function createRoom(targetGroup, width, height, depth, x, z, floorIdx, roomId) {
            const roomGroup = new THREE.Group();
            
            const geom = new THREE.BoxGeometry(width, height, depth);
            const frame = new THREE.LineSegments(new THREE.EdgesGeometry(geom), lineMaterial);
            frame.position.y = height / 2;
            roomGroup.add(frame);

            // Tường phòng (Sẽ đổi màu đỏ chói khi có cháy)
            const roomWallMat = new THREE.MeshBasicMaterial({ color: 0x001122, transparent: true, opacity: 0.4, depthWrite: false, blending: THREE.AdditiveBlending });
            const solid = new THREE.Mesh(geom, roomWallMat);
            solid.name = "Arch:WALL_" + roomId;
            solid.position.y = height / 2;
            roomGroup.add(solid);

            if (floorIdx === 0) addRoundTables(roomGroup, width, depth);
            else if (floorIdx === 1 || floorIdx === 2) addStandardClassroom(roomGroup, width, depth);
            else addFourRowClassroom(roomGroup, width, depth);
            addTV(roomGroup, width, height, depth);

            // Cảm biến Nhiệt độ (Hình cầu)
            const tempSensorMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 }); 
            const tempSensor = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), tempSensorMat);
            tempSensor.position.set(-1, height - 0.3, 0); 
            tempSensor.name = "Device:TEMP_" + roomId;
            roomGroup.add(tempSensor);

            // Cảm biến Khói (Hình trụ dẹt)
            const smokeSensorMat = new THREE.MeshBasicMaterial({ color: 0xdddddd }); 
            const smokeSensor = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1, 8), smokeSensorMat);
            smokeSensor.position.set(1, height - 0.1, 0); 
            smokeSensor.name = "Device:SMOKE_" + roomId;
            roomGroup.add(smokeSensor);

            // 1. Cảm biến CO2 (Hình hộp nhỏ)
            const co2SensorMat = new THREE.MeshBasicMaterial({ color: 0x00aaff }); 
            const co2Sensor = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.4), co2SensorMat);
            co2Sensor.position.set(0, height - 0.1, 1); 
            co2Sensor.name = "Device:CO2_" + roomId;
            roomGroup.add(co2Sensor);

            // 2. Camera góc chéo (Hình nón đen)
            const camMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cam1Group = new THREE.Group();
            const cam1 = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 4), camMat);
            cam1.rotation.x = Math.PI / 4; cam1.rotation.y = Math.PI / 4;
            cam1Group.add(cam1);
            cam1Group.position.set(-width/2 + 0.5, height - 0.5, -depth/2 + 0.5);
            cam1Group.name = "Device:CAM1_" + roomId;
            roomGroup.add(cam1Group);

            const cam2Group = new THREE.Group();
            const cam2 = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 4), camMat);
            cam2.rotation.x = Math.PI / 4; cam2.rotation.y = -Math.PI * 3/4;
            cam2Group.add(cam2);
            cam2Group.position.set(width/2 - 0.5, height - 0.5, depth/2 - 0.5);
            cam2Group.name = "Device:CAM2_" + roomId;
            roomGroup.add(cam2Group);

            // 3. Bàn giáo viên cho tầng 2 đến tầng 5 (floorIdx 1 đến 4)
            if (floorIdx >= 1 && floorIdx <= 4) {
                const teacherDeskGeom = new THREE.BoxGeometry(1.2, 0.8, 2.5);
                const teacherDesk = createFurnitureBlock(teacherDeskGeom);
                // Dãy có cầu thang (Z âm) đặt bàn bên trái (-2.5), dãy không cầu thang đặt bên phải (2.5)
                const deskZ = (z < 0) ? -2.5 : 2.5;
                teacherDesk.position.set(width/2 - 1.5, 0.4, deskZ);
                roomGroup.add(teacherDesk);
            }

            // 4. Hai cửa ra vào mỗi phòng
            const doorGeom = new THREE.PlaneGeometry(2, 2.5);
            const doorWallZ = z < 0 ? depth/2 + 0.05 : -depth/2 - 0.05;
            
            // Cửa trái
            const door1 = new THREE.LineSegments(new THREE.EdgesGeometry(doorGeom), doorMat);
            door1.position.set(-width/3, 1.25, doorWallZ);
            door1.name = "Arch:DOOR_" + roomId;
            roomGroup.add(door1);

            // Cửa phải
            const door2 = new THREE.LineSegments(new THREE.EdgesGeometry(doorGeom), doorMat);
            door2.position.set(width/3, 1.25, doorWallZ);
            door2.name = "Arch:DOOR_" + roomId;
            roomGroup.add(door2);

            // 5. Thêm 2 Máy lạnh âm trần
            const acMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const acGeom = new THREE.BoxGeometry(1.5, 0.1, 1.5);
            const ac1 = new THREE.Mesh(acGeom, acMat);
            ac1.position.set(-width/4, height - 0.05, 0);
            ac1.name = "Device:AC1_" + roomId;
            roomGroup.add(ac1);
            
            const ac2 = new THREE.Mesh(acGeom, acMat);
            ac2.position.set(width/4, height - 0.05, 0);
            ac2.name = "Device:AC2_" + roomId;
            roomGroup.add(ac2);

            // 6. Thêm 4 Đèn âm trần
            const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
            const lightGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.05, 16);
            const lightPositions = [
                {x: -width/3, z: -depth/4},
                {x: width/3, z: -depth/4},
                {x: -width/3, z: depth/4},
                {x: width/3, z: depth/4}
            ];
            lightPositions.forEach((pos, idx) => {
                const light = new THREE.Mesh(lightGeom, lightMat);
                light.position.set(pos.x, height - 0.02, pos.z);
                light.name = "Device:LIGHT" + (idx+1) + "_" + roomId;
                roomGroup.add(light);
            });

            // 7. Bảng điện / CB điện gần cửa
            const cbMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
            const cbGeom = new THREE.BoxGeometry(0.4, 0.6, 0.1);
            const cbBox = new THREE.Mesh(cbGeom, cbMat);
            const cbZ = z < 0 ? doorWallZ - 0.1 : doorWallZ + 0.1;
            cbBox.position.set(width/3 + 1.2, 1.5, cbZ);
            cbBox.name = "Device:CB_" + roomId;
            roomGroup.add(cbBox);

            roomGroup.position.set(x, 0, z);
            targetGroup.add(roomGroup);

            roomRegistry[roomId] = {
                id: roomId,
                group: roomGroup,
                wallMat: roomWallMat,
                tempSensorMat: tempSensorMat,
                smokeSensorMat: smokeSensorMat,
                co2SensorMat: co2SensorMat,
                temp: 25,
                smoke: 10,
                x: x,
                y: floorIdx * height,
                z: z
            };
        }

        function createRestroom(targetGroup, width, height, depth, x, z) {
            const roomGroup = new THREE.Group();
            const geom = new THREE.BoxGeometry(width, height, depth);
            const solid = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({color: 0x001122, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending}));
            solid.position.y = height / 2;
            solid.name = "Arch:RESTROOM";
            roomGroup.add(solid);
            const frame = new THREE.LineSegments(new THREE.EdgesGeometry(geom), new THREE.LineBasicMaterial({color: 0x0055ff, transparent: true, opacity: 0.5}));
            frame.position.y = height / 2;
            roomGroup.add(frame);
            
            const toiletGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.8, 8);
            const toilet = createFurnitureBlock(toiletGeom);
            toilet.position.set(0, 0.4, 0);
            roomGroup.add(toilet);

            roomGroup.position.set(x, 0, z);
            targetGroup.add(roomGroup);
        }

        function createStairs(targetGroup, width, height, depth, x, z, directionZ = 1) {
            const stairGroup = new THREE.Group();
            const halfSteps = 6; 
            const stepH = height / (halfSteps * 2);
            const stepD = depth / halfSteps; 
            const halfWidth = width / 2.2; 
            const solidWallMat = new THREE.MeshBasicMaterial({ color: 0x001122, transparent: true, opacity: 0.4, depthWrite: false, blending: THREE.AdditiveBlending });

            for(let i=0; i<halfSteps; i++) {
                const geom = new THREE.BoxGeometry(halfWidth, stepH, stepD);
                const frame = new THREE.LineSegments(new THREE.EdgesGeometry(geom), lineMaterial);
                const solid = new THREE.Mesh(geom, solidWallMat);
                const yPos = i * stepH + stepH/2;
                const zPos = directionZ === 1 ? (i * stepD) - depth/2 + stepD/2 : -(i * stepD) + depth/2 - stepD/2;
                const xPos = -width/2 + halfWidth/2; 
                frame.position.set(xPos, yPos, zPos); solid.position.copy(frame.position);
                solid.name = "Arch:STAIRS";
                stairGroup.add(frame); stairGroup.add(solid);
            }

            const landingGeom = new THREE.BoxGeometry(width, stepH, stepD * 1.5);
            const landingFrame = new THREE.LineSegments(new THREE.EdgesGeometry(landingGeom), lineMaterial);
            const landingSolid = new THREE.Mesh(landingGeom, solidWallMat);
            const landingY = halfSteps * stepH;
            const landingZ = directionZ === 1 ? depth/2 : -depth/2;
            landingFrame.position.set(0, landingY, landingZ);
            landingSolid.position.copy(landingFrame.position);
            landingSolid.name = "Arch:STAIRS";
            stairGroup.add(landingFrame); stairGroup.add(landingSolid);

            for(let i=0; i<halfSteps; i++) {
                const geom = new THREE.BoxGeometry(halfWidth, stepH, stepD);
                const frame = new THREE.LineSegments(new THREE.EdgesGeometry(geom), lineMaterial);
                const solid = new THREE.Mesh(geom, solidWallMat);
                const yPos = landingY + i * stepH + stepH/2;
                const zPos = directionZ === 1 ? depth/2 - stepD - (i * stepD) : -depth/2 + stepD + (i * stepD);
                const xPos = width/2 - halfWidth/2; 
                frame.position.set(xPos, yPos, zPos); solid.position.copy(frame.position);
                solid.name = "Arch:STAIRS";
                stairGroup.add(frame); stairGroup.add(solid);
            }
            stairGroup.position.set(x, 0, z);
            targetGroup.add(stairGroup);
        }

        // 3. BỐ TRÍ MẶT BẰNG MỚI (Vừa khít không có khoảng trống)
        const floorHeight = 4;
        const totalFloors = 5;
        // Tính toán Tòa nhà: Dãy trên có 5 phòng (Rộng 12 x 5 = 60). Cầu thang(6x2=12), WC(6x2=12). Tổng = 84.
        // Dãy dưới có 7 phòng (Rộng 12 x 7 = 84). Hoàn toàn lấp đầy không gian.
        const buildingWidth = 88; // Bao gồm viền
        const buildingDepth = 24;
        const floorsList = [];

        for (let floorIdx = 0; floorIdx < totalFloors; floorIdx++) {
            const floorGroup = new THREE.Group();
            floorGroup.position.y = floorIdx * floorHeight;

            const floorBase = new THREE.Mesh(new THREE.PlaneGeometry(buildingWidth, buildingDepth), floorMaterial);
            floorBase.rotation.x = -Math.PI / 2;
            floorBase.name = "Arch:FLOOR";
            floorGroup.add(floorBase);

            const corridorGeom = new THREE.BoxGeometry(buildingWidth - 4, floorHeight, 6);
            const corridorSolid = new THREE.Mesh(corridorGeom, new THREE.MeshBasicMaterial({color: 0x001122, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending}));
            corridorSolid.position.y = floorHeight/2;
            corridorSolid.name = "Arch:CORRIDOR";
            floorGroup.add(corridorSolid);
            const corridorFrame = new THREE.LineSegments(new THREE.EdgesGeometry(corridorGeom), lineMaterial);
            corridorFrame.position.y = floorHeight/2;
            floorGroup.add(corridorFrame);

            if (floorIdx === 0) {
                const mainDoorGeom = new THREE.BoxGeometry(6, 3, 0.5);
                const mainDoor = new THREE.LineSegments(new THREE.EdgesGeometry(mainDoorGeom), new THREE.LineBasicMaterial({color: 0xffaa00, linewidth: 2}));
                mainDoor.position.set(0, 1.5, buildingDepth/2);
                floorGroup.add(mainDoor);
            }

            // DÃY TRÊN (Z = -7): 5 Phòng học + 2 Cầu thang + 2 NVS
            createStairs(floorGroup, 6, floorHeight, 8, -39, -7, 1);
            if (floorIdx > 0) createRestroom(floorGroup, 6, floorHeight, 6, -33, -7);
            
            const topXs = [-24, -12, 0, 12, 24]; // 5 phòng x Rộng 12
            topXs.forEach((xPos, idx) => {
                let rId = (floorIdx === 1 && idx === 2) ? 'A101' : `L${floorIdx+1}-T${idx+1}`;
                createRoom(floorGroup, 12, floorHeight, 8, xPos, -7, floorIdx, rId);
            });

            if (floorIdx > 0) createRestroom(floorGroup, 6, floorHeight, 6, 33, -7);
            createStairs(floorGroup, 6, floorHeight, 8, 39, -7, -1);

            // DÃY DƯỚI (Z = 7): 7 Phòng học vừa khít không gian 84m
            const botXs = [-36, -24, -12, 0, 12, 24, 36]; // 7 phòng x Rộng 12
            botXs.forEach((xPos, idx) => {
                createRoom(floorGroup, 12, floorHeight, 8, xPos, 7, floorIdx, `L${floorIdx+1}-B${idx+1}`);
            });

            campusGroup.add(floorGroup);
            floorsList.push({ idx: floorIdx, group: floorGroup });
        }

        // 4. EXTERIOR SHELL
        const buildingHeight = totalFloors * floorHeight;
        const extGeom = new THREE.BoxGeometry(buildingWidth, buildingHeight, buildingDepth);
        const extFrame = new THREE.LineSegments(new THREE.EdgesGeometry(extGeom), exteriorEdgeMat);
        const extSolid = new THREE.Mesh(extGeom, exteriorGlassMat);
        extSolid.name = "Arch:BUILDING_SHELL";
        extFrame.position.y = buildingHeight / 2;
        extSolid.position.y = buildingHeight / 2;
        campusGroup.add(extFrame); campusGroup.add(extSolid);

        const balconyWidth = 2; 
        const balconyDepth = 12; 
        const balconyHeight = buildingHeight - floorHeight; 
        const balconyGeom = new THREE.BoxGeometry(balconyWidth, balconyHeight, balconyDepth);
        
        const leftBalcony = new THREE.Mesh(balconyGeom, balconyMat);
        leftBalcony.position.set(-buildingWidth/2 - balconyWidth/2, balconyHeight/2 + floorHeight, 0);
        campusGroup.add(leftBalcony);
        campusGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(balconyGeom), new THREE.LineBasicMaterial({color: 0xff2244})).copy(leftBalcony));

        const rightBalcony = new THREE.Mesh(balconyGeom, balconyMat);
        rightBalcony.position.set(buildingWidth/2 + balconyWidth/2, balconyHeight/2 + floorHeight, 0);
        campusGroup.add(rightBalcony);
        campusGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(balconyGeom), new THREE.LineBasicMaterial({color: 0xff2244})).copy(rightBalcony));

        const sideDoorGeom = new THREE.BoxGeometry(balconyWidth, 3, 4);
        const leftDoor = new THREE.LineSegments(new THREE.EdgesGeometry(sideDoorGeom), new THREE.LineBasicMaterial({color: 0xffff00, linewidth: 2}));
        leftDoor.position.set(-buildingWidth/2 - balconyWidth/2, 1.5, 0);
        campusGroup.add(leftDoor);

        const rightDoor = new THREE.LineSegments(new THREE.EdgesGeometry(sideDoorGeom), new THREE.LineBasicMaterial({color: 0xffff00, linewidth: 2}));
        rightDoor.position.set(buildingWidth/2 + balconyWidth/2, 1.5, 0);
        campusGroup.add(rightDoor);

        scene.add(campusGroup);

        // ==========================================
        // LOGIC XỬ LÝ IoT VÀ UI (Camera Focus + Màu đậm)
        // ==========================================
        const roomSelect = document.getElementById('roomSelect');
        const tempSlider = document.getElementById('tempSlider');
        const tempValue = document.getElementById('tempValue');
        const smokeSlider = document.getElementById('smokeSlider');
        const smokeValue = document.getElementById('smokeValue');
        const sysStatus = document.getElementById('sys-status');
        const btnSimulate = document.getElementById('btnSimulate');
        const btnExport = document.getElementById('btnExport');
        const isolateMode = document.getElementById('isolateMode');

        Object.keys(roomRegistry).sort().forEach(id => {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = id === 'A101' ? 'L2 - Room A101 (Demo)' : `Room ${id}`;
            roomSelect.appendChild(opt);
        });

        // ĐỔI MÀU CẢNH BÁO MẠNH HƠN
        function applyIoTColor(roomId) {
            const data = roomRegistry[roomId];
            if (!data) return;

            let isTempWarning = data.temp >= 30 && data.temp < 45;
            let isTempCritical = data.temp >= 45;
            let isSmokeWarning = data.smoke >= 30 && data.smoke < 60;
            let isSmokeCritical = data.smoke >= 60;

            if (isTempCritical) data.tempSensorMat.color.setHex(0xff0000);
            else if (isTempWarning) data.tempSensorMat.color.setHex(0xffff00);
            else data.tempSensorMat.color.setHex(0x00ff88);

            if (isSmokeCritical) data.smokeSensorMat.color.setHex(0xff3300);
            else if (isSmokeWarning) data.smokeSensorMat.color.setHex(0xff9900);
            else data.smokeSensorMat.color.setHex(0xdddddd);

            // KHI CÓ CHÁY -> ĐỔI MÀU TƯỜNG CỰC KỲ ĐẬM (Opacity = 0.9) ĐỂ DỄ NHÌN THẤY
            if (isTempCritical || isSmokeCritical) {
                data.wallMat.color.setHex(0xff0000); 
                data.wallMat.opacity = 0.9;
            } else if (isTempWarning || isSmokeWarning) {
                data.wallMat.color.setHex(0xffaa00); 
                data.wallMat.opacity = 0.7;
            } else {
                data.wallMat.color.setHex(0x001122); 
                data.wallMat.opacity = 0.4;
            }
        }

        function checkOverallStatus() {
            let hasCritical = false;
            let criticalRoom = "";
            let issueType = "";
            
            for (let id in roomRegistry) {
                if (roomRegistry[id].temp >= 45) {
                    hasCritical = true; criticalRoom = id; issueType = "FIRE"; break;
                }
                if (roomRegistry[id].smoke >= 60) {
                    hasCritical = true; criticalRoom = id; issueType = "HEAVY SMOKE"; break;
                }
            }
            if (hasCritical) {
                sysStatus.innerHTML = `<span class="alert">CRITICAL ${issueType} DETECTED (${criticalRoom})</span>`;
            } else {
                sysStatus.innerHTML = `<span style="color:#00ff88">ALL SENSORS NORMAL</span>`;
            }
        }

        tempSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            tempValue.innerText = val;
            const selectedId = roomSelect.value;
            roomRegistry[selectedId].temp = parseFloat(val);
            applyIoTColor(selectedId);
            checkOverallStatus();
        });

        smokeSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            smokeValue.innerText = val;
            const selectedId = roomSelect.value;
            roomRegistry[selectedId].smoke = parseFloat(val);
            applyIoTColor(selectedId);
            checkOverallStatus();
        });

        // TÍNH NĂNG MỚI: CAMERA TỰ ĐỘNG FOCUS VÀO PHÒNG ĐANG CHỌN ĐỂ DỄ NHÌN THẤY BÁO ĐỘNG
        roomSelect.addEventListener('change', () => {
            const selectedId = roomSelect.value;
            tempSlider.value = roomRegistry[selectedId].temp;
            tempValue.innerText = roomRegistry[selectedId].temp;
            smokeSlider.value = roomRegistry[selectedId].smoke;
            smokeValue.innerText = roomRegistry[selectedId].smoke;

            // Di chuyển tâm xoay của camera (target) vào chính giữa căn phòng được chọn
            const r = roomRegistry[selectedId];
            controls.target.set(r.x, r.y + 2, r.z);
            
            updateIsolation();
        });

        function updateIsolation() {
            const isIsolated = isolateMode.checked;
            const selectedId = roomSelect.value;
            
            extSolid.visible = !isIsolated;
            extFrame.visible = !isIsolated;
            leftBalcony.visible = !isIsolated;
            rightBalcony.visible = !isIsolated;
            leftDoor.visible = !isIsolated;
            rightDoor.visible = !isIsolated;
            
            for (let id in roomRegistry) {
                if (isIsolated) {
                    roomRegistry[id].group.visible = (id === selectedId);
                } else {
                    roomRegistry[id].group.visible = true;
                }
            }
        }

        isolateMode.addEventListener('change', updateIsolation);

        // TÍCH HỢP MONGODB REAL-TIME (THAY THẾ HOÀN TOÀN DỮ LIỆU MOCK)
        async function syncWithDatabase() {
            try {
                const res = await fetch('http://localhost:8000/api/db/sensors');
                if (!res.ok) return;
                
                const dbData = await res.json();
                if (dbData.error) {
                    console.error("DB Error:", dbData.error);
                    return;
                }
                
                // Cập nhật roomRegistry từ DB
                for (let roomId in dbData) {
                    if (roomRegistry[roomId]) {
                        roomRegistry[roomId].temp = dbData[roomId].temp;
                        roomRegistry[roomId].smoke = dbData[roomId].smoke;
                        if(dbData[roomId].co2 !== undefined) {
                            roomRegistry[roomId].co2 = dbData[roomId].co2;
                        }
                        
                        applyIoTColor(roomId);
                    }
                }
                
                // Cập nhật UI Slider cho phòng đang chọn (để hiển thị trực quan)
                const selectedId = roomSelect.value;
                if (roomRegistry[selectedId]) {
                    tempSlider.value = roomRegistry[selectedId].temp;
                    tempValue.innerText = Number(roomRegistry[selectedId].temp).toFixed(1);
                    smokeSlider.value = roomRegistry[selectedId].smoke;
                    smokeValue.innerText = Number(roomRegistry[selectedId].smoke).toFixed(1);
                }
                
                checkOverallStatus();
            } catch(e) {
                console.error("Failed to sync DB:", e);
            }
        }
        
        // Gọi đồng bộ tự động mỗi 2 giây
        setInterval(syncWithDatabase, 2000);

        // XUẤT FILE GLB TỪ MÔ HÌNH THREE.JS
        btnExport.innerText = "⬇️ Export All Models (Batch)";
        btnExport.addEventListener('click', async () => {
            btnExport.innerText = "ĐANG XUẤT (Vui lòng đợi)...";
            btnExport.style.background = "#ffaa00";
            btnExport.disabled = true;
            
            const exporter = new GLTFExporter();
            const zip = new JSZip();
            
            const exportGLB = (object, filename, folder) => {
                return new Promise((resolve, reject) => {
                    exporter.parse(
                        object,
                        function ( gltf ) {
                            zip.folder(folder).file(filename, gltf);
                            resolve();
                        },
                        function ( error ) {
                            reject(error);
                        },
                        { binary: true } // Định dạng GLB (nhị phân) thay vì GLTF
                    );
                });
            };

            try {
                // 1. Xuất 60 phòng
                const roomIds = Object.keys(roomRegistry);
                for (let i = 0; i < roomIds.length; i++) {
                    const rId = roomIds[i];
                    btnExport.innerText = `ĐANG XUẤT PHÒNG ${rId} (${i+1}/${roomIds.length})...`;
                    await exportGLB(roomRegistry[rId].group, `Phong_${rId}.glb`, 'Phong');
                }

                // 2. Xuất 5 Tầng
                for (let i = 0; i < floorsList.length; i++) {
                    btnExport.innerText = `ĐANG XUẤT TẦNG ${i}...`;
                    await exportGLB(floorsList[i].group, `Tang_${i}.glb`, 'Tang');
                }

                // 3. Xuất Tòa Nhà
                btnExport.innerText = `ĐANG XUẤT TÒA NHÀ...`;
                await exportGLB(campusGroup, `Building_Campus.glb`, 'Toanha');

                btnExport.innerText = `ĐANG NÉN FILE ZIP...`;
                const content = await zip.generateAsync({type:"blob"});
                
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "DNTU_Models_Export.zip";
                link.click();

                btnExport.innerText = "XUẤT XONG (Đã tải file Zip)!";
                btnExport.style.background = "#00ff00";
                btnExport.style.color = "#000";
            } catch (err) {
                console.error("Lỗi xuất:", err);
                btnExport.innerText = "LỖI XUẤT FILE";
                btnExport.style.background = "red";
            }
        });

        // Set trạng thái ban đầu: Tất cả bình thường, chưa có báo động
        roomSelect.value = 'L1-B1'; // Mặc định chọn phòng đầu tiên
        // Chỉ gọi check để hiển thị "ALL SENSORS NORMAL"
        checkOverallStatus();

        // 6. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Trọng tâm camera được update liên tục
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
