<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNTU Admin Control Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #ff5252; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .room-card {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            border-top: 4px solid #4CAF50;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .room-card h3 { margin: 0; color: #ddd; font-size: 22px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; }
        
        button { cursor: pointer; font-weight: bold; transition: all 0.2s; padding: 12px; font-size: 14px; border: none; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button:hover { filter: brightness(1.2); }
        button:active { transform: scale(0.98); }
        
        .btn-empty { background: #555; color: white; }
        .btn-active { background: #4CAF50; color: white; }
        .btn-fire { background: #ff5252; color: white; }
        
        .btn-link { background: transparent; border: 1px solid #03a9f4; color: #03a9f4; margin-top: 30px; padding: 15px; font-size: 16px; }
        .btn-link:hover { background: rgba(3, 169, 244, 0.1); }

        .status-box { background: #000; padding: 15px; border-radius: 6px; font-family: monospace; color: #0f0; margin-top: 20px; min-height: 50px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>BẢNG ĐIỀU KHIỂN DÀNH CHO GIẢNG VIÊN</h1>
    <p class="subtitle">Quản lý trạng thái các phòng học theo thời gian thực (Gửi lệnh qua MQTT giả lập)</p>
    
    <div class="grid-container" id="room-grid">
        <!-- Room Cards will be generated here -->
        <script>
            const rooms = ['A101', 'A102', 'A103', 'A104', 'A105', 'A106'];
            let htmlContent = '';
            rooms.forEach(room => {
                htmlContent += `
                    <div class="room-card" id="card-${room}">
                        <h3>Phòng ${room}</h3>
                        <button class="btn-empty" onclick="triggerAction('reset', '${room}')">PHÒNG TRỐNG</button>
                        <button class="btn-active" onclick="triggerAction('presence', '${room}')">CÓ NGƯỜI</button>
                        <button class="btn-fire" onclick="triggerAction('fire', '${room}')">BÁO CHÁY</button>
                    </div>
                `;
            });
            document.getElementById('room-grid').innerHTML = htmlContent;
        </script>
    </div>

    <div id="fireStatus" class="status-box">Sẵn sàng điều chỉnh dữ liệu thiết bị...</div>

    <button class="btn-link" onclick="window.location.href='/dashboard.html'">Trở về trang Dashboard chính 3D</button>

</div>

<script>
    async function triggerAction(action, roomId) {
        const severity = 'large'; // Default to large fire
        const statusBox = document.getElementById('fireStatus');
        
        let endpoint = '/api/admin/simulate/reset';
        if(action === 'fire') endpoint = '/api/admin/simulate/fire';
        if(action === 'presence') endpoint = '/api/admin/simulate/presence';
        
        statusBox.style.color = '#ffaa00';
        statusBox.innerText = `[${new Date().toLocaleTimeString()}] Đang can thiệp vào cấu hình thiết bị phòng ${roomId}...`;
        
        // Highlight active card
        document.querySelectorAll('.room-card').forEach(card => card.style.borderTopColor = '#444');
        const card = document.getElementById(`card-${roomId}`);
        if(action === 'reset') card.style.borderTopColor = '#555';
        if(action === 'presence') card.style.borderTopColor = '#4CAF50';
        if(action === 'fire') card.style.borderTopColor = '#ff5252';

        try {
            // Cần sử dụng đường dẫn tuyệt đối hoặc fetch tương đối tùy thuộc vào việc mở file
            // Nhưng vì file này có thể bị mở bằng file:/// nên tốt nhất là gọi thẳng http://localhost:5000
            const baseUrl = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';
            const fullUrl = baseUrl + endpoint;

            const response = await fetch(fullUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ room_id: roomId, severity: severity })
            });
            
            const result = await response.json();
            if(result.success) {
                statusBox.style.color = '#0f0';
                statusBox.innerHTML = `[${new Date().toLocaleTimeString()}] ${result.message}<br><span style="color:#ffaa00; font-size:14px;">⏳ Đang restart thiết bị giả lập (3-5 giây)...</span>`;
            } else {
                statusBox.style.color = '#f00';
                statusBox.innerText = `Lỗi: ${result.message}`;
            }
        } catch (error) {
            statusBox.style.color = '#f00';
            statusBox.innerText = `Lỗi kết nối Server: ${error.message} (Nếu bạn mở file bằng click đúp, hãy dùng http://localhost:5000/admin_control.html)`;
        }
    }
</script>

</body>
</html>
