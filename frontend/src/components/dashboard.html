<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNTU X-Ray | Drill-down Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #d4d4d8;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    </style>
</head>
<body>

    <main class="flex-1 relative bg-black">
        <div id="three-container" class="w-full h-[67%] cursor-crosshair border-b border-blue-500/20"></div>

        <!-- Nút Back -->
        <button id="btn-back" onclick="restoreOverallModel()" class="absolute top-6 left-6 px-6 py-3 bg-red-600 hover:bg-red-500 text-white font-bold font-mono text-sm rounded shadow-2xl shadow-red-500/50 transition-all border border-red-400 z-50 cursor-pointer hidden pointer-events-auto flex items-center gap-2">
            BACK TO BUILDING (ESC)
        </button>

        <!-- Context & Sensor Panel (Ẩn lối tắt) -->
        <div id="context-panel" class="hidden">
            <div id="ctx-title"></div>
            <div id="ctx-sensors">
                <div id="ctx-temp"></div>
                <div id="ctx-smoke"></div>
                <div id="ctx-co2"></div>
            </div>
        </div>

        <!-- Floating Info (Ẩn lối tắt) -->
        <div class="hidden">
            <div id="click-info"></div>
        </div>
        <!-- Tooltip Hover -->
        <div id="hover-tooltip" class="absolute bg-black/80 border border-blue-500 text-white font-mono text-[10px] p-2 rounded shadow-lg pointer-events-none hidden z-50 whitespace-pre">
            Tooltip Info
        </div>

        <!-- Operator Controls (Ẩn theo yêu cầu) -->
        <div id="operator-controls" class="hidden absolute bottom-[35%] right-4 bg-[#0c0c0e]/90 border border-yellow-500/50 rounded p-4 shadow-lg shadow-yellow-500/20 z-50 flex flex-col gap-2 font-mono">
        </div>

        <!-- 2D Map Area (Bottom 1/3) -->
        <div id="map-2d-container" class="absolute bottom-0 left-0 w-full h-[33%] bg-[#0c0c0e] border-t border-blue-500/30 flex flex-col z-20 transition-all">
            <div class="bg-blue-500/20 text-blue-400 font-bold text-[10px] px-2 py-1 uppercase border-b border-white/10 flex justify-between">
                <span>2D FLOOR PLAN</span> <span id="map-floor-name" class="text-zinc-400">GROUND FLOOR</span>
            </div>
            <div class="logo" style="padding: 5px 10px; color: #fff; font-family: monospace;">
                DNTU CruzrTwin Top 8
                <a href="/admin_control.html" style="font-size:12px; margin-left: 15px; color: #ff5252; text-decoration: none; border: 1px solid #ff5252; padding: 3px 8px; border-radius: 4px;">Admin Control Panel</a>
            </div>
            <div class="flex-1 relative overflow-hidden p-2 flex items-center justify-center">
                <canvas id="map-2d-canvas" class="w-full h-full object-contain"></canvas>
            </div>
        </div>
    </main>

    <!-- RIGHT PANEL: LOGS (5 luồng song song) -->
    <aside class="w-[350px] flex flex-col border-l border-white/10 bg-[#0c0c0e] h-screen overflow-hidden">
        <!-- AI DETECTION -->
        <div id="panel-ai" class="h-1/4 border-b border-white/10 flex flex-col transition-all">
            <div class="bg-blue-500/10 text-blue-400 font-bold text-[10px] px-3 py-1.5 uppercase border-b border-white/5 flex justify-between">
                <span>AI_DETECTION</span> <span class="text-zinc-500">Live</span>
            </div>
            <div id="log-ai" class="flex-1 overflow-y-auto p-2 space-y-1 log-container font-mono text-[9px]"></div>
        </div>

        <!-- ALERTS -->
        <div id="panel-alerts" class="h-1/4 border-b border-white/10 flex flex-col transition-all">
            <div class="bg-red-500/10 text-red-400 font-bold text-[10px] px-3 py-1.5 uppercase border-b border-white/5 flex justify-between">
                <span>ALERT_EVENTS</span> <span class="text-zinc-500">Live</span>
            </div>
            <div id="log-alerts" class="flex-1 overflow-y-auto p-2 space-y-1 log-container font-mono text-[9px]"></div>
        </div>

        <!-- ROBOT ACTIONS -->
        <div id="panel-robot" class="h-1/4 border-b border-white/10 flex flex-col transition-all">
            <div class="bg-yellow-500/10 text-yellow-400 font-bold text-[10px] px-3 py-1.5 uppercase border-b border-white/5 flex justify-between">
                <span>ROBOT_ACTIONS</span> <span class="text-zinc-500">Live</span>
            </div>
            <div id="log-robot" class="flex-1 overflow-y-auto p-2 space-y-1 log-container font-mono text-[9px]"></div>
        </div>

        <!-- SYS STATE -->
        <div id="panel-state" class="h-1/4 border-b border-white/10 flex flex-col transition-all">
            <div class="bg-purple-500/10 text-purple-400 font-bold text-[10px] px-3 py-1.5 uppercase border-b border-white/5 flex justify-between">
                <span>ORION_STATE</span> <span class="text-zinc-500">Live</span>
            </div>
            <div id="log-state" class="flex-1 overflow-y-auto p-2 space-y-1 log-container font-mono text-[9px]"></div>
        </div>

        <!-- SENSORS -->
        <div id="panel-sensors" class="h-1/4 flex flex-col transition-all">
            <div class="bg-emerald-500/10 text-emerald-400 font-bold text-[10px] px-3 py-1.5 uppercase border-b border-white/5 flex justify-between">
                <span>RAW_SENSORS</span> <span class="text-zinc-500">Live</span>
            </div>
            <div id="log-sensors" class="flex-1 overflow-y-auto p-2 space-y-1 log-container font-mono text-[9px]"></div>
        </div>
    </aside>

    <script>
        // API Kích hoạt phòng
        async function activateRoom(roomId) {
            try {
                document.getElementById('ctx-temp').innerText = `Đang kích hoạt...`;
                const baseUrl = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';
                await fetch(`${baseUrl}/api/db/sensors/activate?roomId=${roomId}`, { method: 'POST' });
            } catch(e) { console.error(e); }
        }
        // Biến trạng thái toàn cục
        let activeRoomId = null;
        let activeFloorIdx = 0; // Tầng đang xem (0: Trệt, 1: Tầng 1, ...)

        // API Operator ACK
        async function sendOperatorAck(decision) {
            const statusDiv = document.getElementById('operator-status');
            statusDiv.innerText = "Sending...";
            statusDiv.style.color = "#ffaa00";
            
            const payload = {
                "demo_run_id": "DNTU02_TOP8_RUN_2026_001",
                "operator_id": "demo_operator",
                "alert_id": "AlertEvent:SCN_CRITICAL_001",
                "robot_action_id": "RobotAction:CRUZR_ACTION_001",
                "scenario_id": "SCN_CRITICAL_001",
                "zone_id": activeRoomId ? `DNTU_ROOM_${activeRoomId}` : "DNTU_ROOM_A101",
                "decision": decision,
                "note": decision === "ACK" ? "Operator confirmed Cruzr guidance delivered." : "Operator reported error on-site."
            };

            try {
                const response = await fetch('http://127.0.0.1:5000/api/operator/ack', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (response.ok) {
                    statusDiv.innerText = `Thành công: ${result.status}`;
                    statusDiv.style.color = "#00ff00";
                } else {
                    statusDiv.innerText = `Lỗi: ${result.error || result.error_message || "Unknown error"}`;
                    statusDiv.style.color = "red";
                }
            } catch (err) {
                statusDiv.innerText = "Lỗi kết nối API!";
                statusDiv.style.color = "red";
                console.error("Operator ACK Error:", err);
            }
        }

        // --- LOGS LOGIC (Gọi NPM API cho 5 bảng song song) ---
        const logTypes = ['ai', 'alerts', 'robot', 'state', 'sensors'];

        const baseUrl = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';

        async function fetchLogs() {
            logTypes.forEach(async (type) => {
                try {
                    const res = await fetch(`${baseUrl}/api/logs/${type}`);
                    if (!res.ok) return;
                    const logs = await res.json();

                    const display = document.getElementById('log-' + type);
                    if (display) display.innerHTML = '';

                    if (logs.length === 0) {
                        display.innerHTML = '<div class="text-zinc-600 italic">Chưa có dữ liệu.</div>';
                        return;
                    }

                    // Lọc log nếu đang xem 1 phòng
                    let filteredLogs = logs;
                    if (activeRoomId) {
                        const searchToken = activeRoomId.toLowerCase();
                        filteredLogs = logs.filter(log => JSON.stringify(log).toLowerCase().includes(searchToken));
                    }

                    if (filteredLogs.length === 0 && activeRoomId) {
                        display.innerHTML = `<div class="text-zinc-600 italic">Không có sự kiện cho phòng ${activeRoomId}</div>`;
                        return;
                    }

                    // --- ĐIỀU PHỐI VỊ TRÍ ROBOT TỪ LOG ---
                    if (type === 'robot' && logs.length > 0) {
                        const latestDest = logs[0].destination;
                        if (latestDest && latestDest !== currentRobotDest) {
                            currentRobotDest = latestDest;
                            updateRobotTarget(latestDest);
                        }
                    }

                    filteredLogs.forEach(log => {
                        const div = document.createElement('div');
                        let isWarningOrCritical = false;

                        const time = log.timestamp?.split('T')[1]?.split('Z')[0] || log.TimeInstant || '--:--:--';
                        let content = `<span class="text-zinc-600 mr-1">[${time}]</span>`;

if (type === 'ai') {
                             const lvl = log.predicted_level || log.level || 'INFO';
                             const color = lvl.toUpperCase() === 'CRITICAL' ? 'text-red-500 font-bold' : (lvl.toUpperCase() === 'WARNING' ? 'text-yellow-500 font-bold' : 'text-blue-400');
                             const sv = log.sensor_values || {};
                             let extraInfo = '';
                             if (log.zone_id) extraInfo += ` zone:${log.zone_id}`;
                             if (sv.temperature !== undefined) extraInfo += ` temp:${sv.temperature?.toFixed(1)}`;
                             if (sv.air_quality_or_co2 !== undefined) extraInfo += ` co2:${sv.air_quality_or_co2}`;
                             if (sv.smoke_status !== undefined) extraInfo += ` smoke:${sv.smoke_status}`;
                             content += `<span class="${color}">${lvl.toUpperCase()}</span> ${log.rationale || log.message || ''}${extraInfo}`;
                             if(lvl.toUpperCase() === 'CRITICAL' || lvl.toUpperCase() === 'WARNING') isWarningOrCritical = true;
                         }

                        // Đổi màu nền dòng log nếu có cảnh báo
                        div.className = `border-l-2 border-white/5 pl-2 py-0.5 transition-all text-ellipsis overflow-hidden whitespace-nowrap ${isWarningOrCritical ? 'bg-red-900/30 border-red-500/50' : 'hover:bg-white/5'}`;

                        div.innerHTML = content;
                        display.appendChild(div);
                    });
                } catch (e) {
                    // ignore
                }
            });
        }
        let currentRobotDest = null;
        let targetRobotPos = new THREE.Vector3(0, 0, 0); // Trạm sạc
        let current2DRobotPos = new THREE.Vector3(0, 0, 0); // Vị trí 2D mượt

        function updateRobotTarget(dest) {
            if (dest.includes('CHARGING')) {
                targetRobotPos.set(0, 0, 0);
                return;
            }

            let y = 0, x = 0, z = 0;

            // Xử lý tầng (Y)
            if (dest.includes('L2')) y = 4;
            else if (dest.includes('L3')) y = 8;
            else if (dest.includes('L4')) y = 12;
            else if (dest.includes('L5')) y = 16;
            else y = 0; // A101 hoặc L1

            // Xử lý X và Z (Giả lập vị trí các phòng)
            if (dest === 'A101') { x = -24; z = -7; } // Phòng A101
            else if (dest.includes('T')) { z = -7; x = -24 + (parseInt(dest.split('T')[1]||1)-1)*12; } // Dãy Trái
            else if (dest.includes('B')) { z = 7; x = -36 + (parseInt(dest.split('B')[1]||1)-1)*12; }  // Dãy Phải
            else { x = 0; z = -7; }

            // Nâng y lên một chút để lอย lơ lửng trên mặt sàn
            targetRobotPos.set(x, y + 2, z);
        }

        setInterval(fetchLogs, 2000); // Tự động sync DB mỗi 2 giây

        // --- 3D REAL-TIME SENSOR SYNC ---
        let latestSensorData = {}; // Cache to draw 2D map
        let isAutoPopsUpBlocked = false; // Tránh popup liên tục

async function syncSensors3D() {
             try {
                 const res = await fetch('/api/db/sensors');
                 if (!res.ok) return;
                 const data = await res.json();
                 
                 // Mapping room_id: L1-A1 -> A101, L1-T1 -> L1-T1 (dành cho tầng trên)
                 const normalizedData = {};
                 for (const [key, value] of Object.entries(data)) {
                     if (key.startsWith('L1-A')) {
                         const num = key.split('-A')[1];
                         normalizedData[`A10${num}`] = value;
                         normalizedData[key] = value;
                     }
                     normalizedData[key] = value;
                 }
                 
                 // Mặc định: Tầng trệt (A101-A1015) luôn Active, các tầng khác offline nếu chưa có data
                 for (let i = 1; i <= 15; i++) {
                     const rId = `A10${i}`;
                     if (!normalizedData[rId]) {
                         normalizedData[rId] = { temp: 26, smoke: 0, co2: 400 };
                     }
                 }
                 latestSensorData = normalizedData;

                // Update 2D Map if visible
                if (activeRoomId) {
                    const floorIdx = Math.round(targetRobotPos.y/4); // rough guess of active floor
                    render2DMap(0, activeRoomId); // We'll improve floor tracking

                    if (latestSensorData[activeRoomId]) {
                        document.getElementById('ctx-temp').innerText = `${latestSensorData[activeRoomId].temp.toFixed(1)} °C`;
                        document.getElementById('ctx-smoke').innerText = `${latestSensorData[activeRoomId].smoke.toFixed(1)} %`;
                        document.getElementById('ctx-co2').innerText = `${latestSensorData[activeRoomId].co2.toFixed(1)} ppm`;
                        if (latestSensorData[activeRoomId].temp >= 40) document.getElementById('ctx-temp').className = "font-bold text-red-500";
                        else document.getElementById('ctx-temp').className = "font-bold text-emerald-400";
                    } else {
                        document.getElementById('ctx-temp').innerHTML = `<span class="cursor-pointer underline hover:text-white" onclick="activateRoom('${activeRoomId}')">Offline (Click để Bật)</span>`;
                        document.getElementById('ctx-temp').className = "font-bold text-zinc-500";
                        document.getElementById('ctx-smoke').innerText = `Offline`;
                        document.getElementById('ctx-co2').innerText = `Offline`;
                    }
                }

                // Ẩn các Panel log khác nếu đang trong một phòng (chỉ hiện Sensor)
                if (activeRoomId) {
                    document.getElementById('panel-ai').classList.add('hidden');
                    document.getElementById('panel-alerts').classList.add('hidden');
                    document.getElementById('panel-robot').classList.add('hidden');
                    document.getElementById('panel-state').classList.add('hidden');
                    document.getElementById('panel-sensors').classList.replace('h-1/5', 'h-full');
                } else {
                    document.getElementById('panel-ai').classList.remove('hidden');
                    document.getElementById('panel-alerts').classList.remove('hidden');
                    document.getElementById('panel-robot').classList.remove('hidden');
                    document.getElementById('panel-state').classList.remove('hidden');
                    document.getElementById('panel-sensors').classList.replace('h-full', 'h-1/5');
                }

                // Cập nhật màu sắc lên Mesh (Cho phép thay đổi màu mà không cần reload mô hình)
                let hasCriticalAlert = false;
                let criticalRoomId = null;
                let criticalRoomPos = null;

                const models = [overallModel, activeSubModel].filter(Boolean);
                models.forEach(model => {
                    model.traverse(child => {
                        if (child.isMesh) {
                            let roomId = "";
                            const pos = new THREE.Vector3();
                            child.getWorldPosition(pos);

                            // Nếu đang xem chi tiết một phòng dùng chung, gán thẳng activeRoomId
                            if (model === activeSubModel && activeRoomId) {
                                roomId = activeRoomId;
                            } else {
                                // Mặc định tính ID theo toạ độ
                                const floorIdx = Math.round(pos.y / 4);
                                const isTopRow = pos.z < 0;
                                const idx = Math.round(pos.x / 12) + 3;
                                if (floorIdx === 0) roomId = `A10${idx}`;
                                else roomId = `L${floorIdx + 1}-${isTopRow ? 'T' : 'B'}${idx}`;
                            }

                            // Nếu có định nghĩa tên trong Blender, ưu tiên trích xuất
                            let objName = (child.userData && child.userData.name) ? child.userData.name : child.name;
                            if (objName) {
                                const match = objName.match(/(A10\d|L\d-[TB]\d)/i);
                                if (match) roomId = match[1].toUpperCase();
                            }

                            const sensor = data[roomId];
                            if (sensor) {
                                let materials = Array.isArray(child.material) ? child.material : [child.material];

                                materials.forEach((mat, idx) => {
                                    if (mat && mat.color) {
                                        let cKey = `originalColor_${idx}`;
                                        if (child.userData[cKey] === undefined) child.userData[cKey] = mat.color.getHex();
                                    }
                                });

                                if (sensor.temp >= 40 || sensor.smoke > 50 || sensor.co2 >= 1000) {
                                    hasCriticalAlert = true;
                                    criticalRoomId = roomId;
                                    criticalRoomPos = pos;
                                }
                            }
                        }
                    });
                });

                // TỰ ĐỘNG BẬT POPUP MÔ HÌNH PHÒNG NẾU CÓ CẢNH BÁO
                    if (hasCriticalAlert && criticalRoomId && !isAutoPopsUpBlocked) {
                        // Nếu chưa ở trong chế độ xem phòng đó
                        if (activeRoomId !== criticalRoomId) {
                            isAutoPopsUpBlocked = true;
                            // Tính toán file cần load
                            const floorIdx = Math.round(criticalRoomPos.y / 4);
                            const isTopRow = criticalRoomPos.z < 0;
                            
                            activeRoomId = criticalRoomId;
                            let fileToLoad = `mohinh/Phong/Phong_${activeRoomId}.glb`;
                            document.getElementById('context-panel').classList.remove('hidden');
                            document.getElementById('ctx-title').innerText = `PHÒNG ${activeRoomId} (CẢNH BÁO)`;
                            document.getElementById('ctx-title').className = 'text-red-500 font-bold text-sm mb-2 border-b border-white/10 pb-2 animate-pulse';
                            document.getElementById('ctx-sensors').classList.remove('hidden');
                            document.getElementById('click-info').innerText = "TỰ ĐỘNG POP-UP DO PHÁT HIỆN SỰ CỐ!";
                            document.getElementById('click-info').style.color = '#ff0000';

                            loadSubModel(fileToLoad, criticalRoomPos);

                            setTimeout(() => { isAutoPopsUpBlocked = false; }, 15000); // Cho phép auto popup lại sau 15s nếu đã thoát ra
                        }
                    }

                // Nếu đang trong chế độ xem 1 phòng, cập nhật bảng panel
                if (activeRoomId && latestSensorData[activeRoomId]) {
                    const tempVal = latestSensorData[activeRoomId].temp || 0;
                    const smokeVal = latestSensorData[activeRoomId].smoke || 0;
                    const co2Val = latestSensorData[activeRoomId].co2 || 0;
                    document.getElementById('ctx-temp').innerText = `${tempVal.toFixed(1)} °C`;
                    document.getElementById('ctx-smoke').innerText = `${smokeVal.toFixed(1)} %`;
                    document.getElementById('ctx-co2').innerText = `${co2Val.toFixed(1)} ppm`;
                    if (tempVal >= 40) document.getElementById('ctx-temp').className = "font-bold text-red-500";
                    else document.getElementById('ctx-temp').className = "font-bold";
                }
            } catch (e) {
                // ignore
            }
        }
          
        setInterval(syncSensors3D, 2000); // Tự động sync 3D mỗi 2 giây
        // Gọi sync ban đầu
        syncSensors3D();

        // --- THREE.JS LOGIC & RAYCASTER ---
        const container = document.getElementById('three-container');
        let scene, camera, renderer, controls;
        let overallModel = null;
        let activeSubModel = null;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 100, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setClearColor(0x000000, 1);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 10, 0);

            // Ánh sáng
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0x00aaff, 1);
            directional.position.set(50, 80, 50);
            scene.add(directional);

            // Remove Grid
            // const grid = new THREE.GridHelper(150, 50, 0x112233, 0x112233);
            // scene.add(grid);

            // Lắp ráp mô hình tổng từ các file Tầng trong thư mục mohinh/
            overallModel = new THREE.Group();
            scene.add(overallModel);

            // Đã xoá khối cầu Robot 3D khổng lồ theo yêu cầu

            const loader = new THREE.GLTFLoader();
            const floorsToLoad = [
                { file: 'mohinh/Tang/Tang_0.glb', y: 0 },
                { file: 'mohinh/Tang/Tang_1.glb', y: 4 },
                { file: 'mohinh/Tang/Tang_2.glb', y: 8 },
                { file: 'mohinh/Tang/Tang_3.glb', y: 12 },
                { file: 'mohinh/Tang/Tang_4.glb', y: 16 }
            ];

            let loadedCount = 0;
            floorsToLoad.forEach(floor => {
                loader.load(floor.file, (gltf) => {
                    const floorMesh = gltf.scene;
                    floorMesh.position.y = floor.y;
                    overallModel.add(floorMesh);

                    loadedCount++;
                    if (loadedCount === floorsToLoad.length) {
                        document.getElementById('click-info').innerText = "Đã lắp ráp xong 5 Tầng. Click để bóc tách...";
                    }
                }, undefined, (err) => {
                    console.error("Lỗi load tầng:", floor.file);
                });
            });

            // Sự kiện Click (Raycaster Drill-down)
            renderer.domElement.addEventListener('click', onMouseClick);
            
            // Hỗ trợ chuột phải hoặc ESC để quay lại
            renderer.domElement.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                restoreOverallModel();
            });
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') restoreOverallModel();
            });
            
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function onMouseClick(event) {
            // Nếu đang xem Sub-model thì bỏ qua click
            if (activeSubModel !== null || overallModel === null) return;

            // Tính toán toạ độ chuột
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ( (event.clientX - rect.left) / rect.width ) * 2 - 1;
            mouse.y = - ( (event.clientY - rect.top) / rect.height ) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(overallModel, true);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                // Scale lại nếu lúc xuất model bị scale. Tạm coi scale = 1.
                // Mô hình tổng: Tầng cao 4m. Hành lang ở Z từ -3 đến 3.

                const floorIdx = Math.max(0, Math.min(4, Math.floor(point.y / 4)));
                const isHallway = Math.abs(point.z) < 3.5;

                let fileToLoad = "";
                let msg = "";

                if (isHallway) {
                    // Click vào khu vực giữa -> Tải Tầng
                    fileToLoad = `mohinh/Tang/Tang_${floorIdx}.glb`;
                    msg = `Đang load chi tiết toàn Tầng ${floorIdx}...`;

                    activeRoomId = null;
                    activeFloorIdx = floorIdx;
                    document.getElementById('context-panel').classList.remove('hidden');
                    document.getElementById('ctx-title').innerText = `TẦNG ${floorIdx === 0 ? 'TRỆT' : floorIdx}`;
                    document.getElementById('ctx-sensors').classList.add('hidden'); // Tầng thì tạm ẩn Sensor của 1 phòng

                    document.getElementById('map-2d-container').classList.remove('hidden');
                    render2DMap(floorIdx, null);
                } else {
                    // Click ra 2 bên -> Tải Phòng
                    const isTopRow = point.z < 0; // Trục Z âm là dãy bên trái (nếu nhìn từ đầu hành lang)

                    // Tính toán gần đúng ID phòng dựa trên toạ độ x của raycast
                    const idx = Math.round(point.x / 12) + 3;

                    let objName = (intersects[0].object.userData && intersects[0].object.userData.name) ? intersects[0].object.userData.name : intersects[0].object.name;
                    let extractedId = null;
                    if (objName) {
                        const match = objName.match(/(A10\d|L\d-[TB]\d)/i);
                        if (match) extractedId = match[1].toUpperCase();
                    }

                    // Xác định roomId và floorIdx
                    // A101-A1015 luôn là tầng 0 (trệt), các phòng khác tính theo vị trí
                    if (extractedId && extractedId.startsWith('A10')) {
                        activeRoomId = extractedId;
                        activeFloorIdx = 0;
                    } else {
                        activeRoomId = extractedId || (floorIdx === 0 ? `A10${idx}` : `L${floorIdx + 1}-${isTopRow ? 'T' : 'B'}${idx}`);
                        activeFloorIdx = floorIdx;
                    }
                    
                    fileToLoad = `mohinh/Phong/Phong_${activeRoomId}.glb`;

                    document.getElementById('context-panel').classList.remove('hidden');
                    document.getElementById('ctx-title').innerText = `PHÒNG ${activeRoomId} (Tầng ${floorIdx})`;
                    document.getElementById('ctx-sensors').classList.remove('hidden');
                    document.getElementById('ctx-temp').innerText = 'Loading...';
                    document.getElementById('ctx-smoke').innerText = 'Loading...';
                    document.getElementById('ctx-co2').innerText = 'Loading...';

                    // Ẩn 2D map khi vào chi tiết phòng
                    document.getElementById('map-2d-container').classList.add('hidden');
                }

                document.getElementById('click-info').innerText = msg;
                document.getElementById('click-info').style.color = '#00ff88';

                loadSubModel(fileToLoad, point);
            }
        }

        function loadSubModel(filename, focusPoint) {
            // Xóa model tổng
            scene.remove(overallModel);

            const loader = new THREE.GLTFLoader();
            loader.load(filename, (gltf) => {
                activeSubModel = gltf.scene;

                // Tô màu chuẩn cho Model con để nhìn rõ nội thất
                activeSubModel.traverse(child => {
                    if (child.isMesh) {
                        child.material.wireframe = false;
                        if (!child.material.color) {
                            child.material = new THREE.MeshPhongMaterial({ color: 0xaaaaaa });
                        }
                    }
                });

                scene.add(activeSubModel);

                // Zoom camera vào sát
                camera.position.set(0, 15, 30);
                controls.target.set(0, 2, 0);

                // Hiện nút Back
                document.getElementById('btn-back').classList.remove('hidden');
                document.getElementById('click-info').innerText = "Đã load thành công: " + filename;

                // Kích hoạt render 2D map nếu là phòng (hiện tại ẩn map đi)
                if (activeRoomId) {
                    document.getElementById('map-2d-container').classList.add('hidden');
                } else {
                    document.getElementById('map-2d-container').classList.remove('hidden');
                }
            }, undefined, (error) => {
                if (filename !== 'mohinh/Phong/Phong_A101.glb') {
                    console.warn("Không tìm thấy file:", filename, "Dùng phòng mẫu A101 thay thế.");
                    loadSubModel('mohinh/Phong/Phong_A101.glb', focusPoint);
                    return;
                }
                console.error("Không tìm thấy file:", filename);
                document.getElementById('click-info').innerText = "Lỗi: File " + filename + " không tồn tại!";
                document.getElementById('click-info').style.color = 'red';
                restoreOverallModel(); // Bị lỗi thì trả về model cũ
            });
        }

        let tooltipTimeout;

        // Sự kiện Hover (Di chuột)
        window.addEventListener('mousemove', (e) => {
            // Chỉ tính toán raycast nếu di chuột trong vùng 3D (chiếm 2/3 trên, hoặc toàn main width)
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            let objectsToCheck = overallModel ? overallModel.children : [];
            if (activeSubModel) objectsToCheck = [activeSubModel];

            // Check intersection with robot
            // (Đã xoá robotPoint 3D)

            const intersects = raycaster.intersectObjects(objectsToCheck, true);
            const tooltip = document.getElementById('hover-tooltip');

            if (intersects.length > 0) {
                const point = intersects[0].point;
                const object = intersects[0].object;

                let info = "";

                // Tính ID phòng dựa trên toạ độ
                const y = Math.max(0, point.y);
                    const floorIdx = Math.round(y / 4);
                    const isTopRow = point.z < 0;
                    const idx = Math.round(point.x / 12) + 3;

                    let roomId = "";
                    if (activeSubModel && activeRoomId) {
                        roomId = activeRoomId;
                    } else {
                        if (floorIdx === 0) {
                            roomId = `A10${idx}`;
                        } else {
                            const floorName = `L${floorIdx + 1}`;
                            const prefix = isTopRow ? 'T' : 'B';
                            roomId = `${floorName}-${prefix}${idx}`;
                        }
                    }

                    // Chỉ nhận diện cảm biến nếu tên có chứa từ khóa
                    let isSensor = false;
                    let objName = "";
                    if (object.userData && object.userData.name) objName = object.userData.name;
                    else if (object.name) objName = object.name;

                    if (objName) {
                        const match = objName.match(/(A10\d|L\d-[TB]\d)/i);
                        if (match) roomId = match[1].toUpperCase();

                        const nameUpper = objName.toUpperCase();
                        if (nameUpper.includes('TEMP') || nameUpper.includes('SMOKE') || nameUpper.includes('CO2') || nameUpper.includes('AIR') || nameUpper.includes('SENSOR') || nameUpper.includes('PLUG') || nameUpper.includes('AC') || nameUpper.includes('CAM') || nameUpper.includes('LIGHT') || nameUpper.includes('CB')) {
                            isSensor = true;
                        }
                    }

                    // Lấy dữ liệu cảm biến nếu có
                    let extraData = "";
                    let deviceType = "Thiết bị";
                    
                    if (latestSensorData[roomId]) {
                        const tempVal = latestSensorData[roomId].temp || 0;
                        const smokeVal = latestSensorData[roomId].smoke || 0;
                        const co2Val = latestSensorData[roomId].co2 || 0;

                        if (objName && objName.toUpperCase().includes('TEMP')) {
                            deviceType = "Cảm biến Nhiệt độ";
                            extraData = `\nNhiệt độ: ${tempVal.toFixed(1)}°C`;
                        } else if (objName && objName.toUpperCase().includes('SMOKE')) {
                            deviceType = "Cảm biến Khói";
                            extraData = `\nKhói: ${smokeVal.toFixed(1)}%`;
                        } else if (objName && objName.toUpperCase().includes('CO2')) {
                            deviceType = "Cảm biến CO2";
                            extraData = `\nCO2: ${co2Val.toFixed(1)} ppm`;
                        } else if (objName && objName.toUpperCase().includes('AC')) {
                            deviceType = "Điều hòa (AC)";
                            extraData = `\nTrạng thái: Bình thường (24°C)`; 
                        } else if (objName && objName.toUpperCase().includes('CAM')) {
                            deviceType = "Camera An ninh";
                            extraData = `\nTrạng thái: Đang ghi hình`; 
                        } else if (objName && objName.toUpperCase().includes('LIGHT')) {
                            deviceType = "Đèn chiếu sáng";
                            extraData = `\nTrạng thái: Đang bật`; 
                        } else if (objName && objName.toUpperCase().includes('CB')) {
                            deviceType = "Tủ điện (CB)";
                            extraData = `\nTrạng thái: Đóng điện an toàn`; 
                        } else {
                            extraData = `\nNhiệt độ: ${tempVal.toFixed(1)}°C\nKhói: ${smokeVal.toFixed(1)}%\nCO2: ${co2Val.toFixed(1)} ppm`;
                        }
                    } else {
                        extraData = `\n(Phòng trống / Offline)`;
                    }

                    if (isSensor) {
                        info = `Thiết bị: ${deviceType}\nID: ${objName || 'Không rõ'} (Phòng ${roomId})${extraData}`;
                    } else if (objName && objName.toUpperCase().includes('ARCH:DOOR')) {
                        info = `Cửa ra vào\nKhu vực: Phòng ${roomId}`;
                    } else if (objName && objName.toUpperCase().includes('ARCH:WALL')) {
                        info = `Tường\nKhu vực: Phòng ${roomId}${extraData}`;
                    } else if (objName && objName.toUpperCase().includes('ARCH:STAIRS')) {
                        info = `Cầu thang bộ\nTầng: ${floorIdx === 0 ? 'Trệt' : floorIdx + 1}`;
                    } else if (objName && objName.toUpperCase().includes('ARCH:RESTROOM')) {
                        info = `Nhà vệ sinh chung\nTầng: ${floorIdx === 0 ? 'Trệt' : floorIdx + 1}`;
                    } else if (objName && objName.toUpperCase().includes('ARCH:FLOOR')) {
                        info = `Sàn nhà\nTầng: ${floorIdx === 0 ? 'Trệt' : floorIdx + 1}`;
                    } else if (objName && objName.toUpperCase().includes('ARCH:CORRIDOR')) {
                        info = `Hành lang chính\nTầng: ${floorIdx === 0 ? 'Trệt' : floorIdx + 1}`;
                    } else if (objName && objName.toUpperCase().includes('ARCH:BUILDING_SHELL')) {
                        info = `Lớp vỏ Tòa nhà F\nCampus DNTU`;
                    } else if (Math.abs(point.z) < 3 && (!objName || !objName.includes('ROOM'))) {
                        info = `Khu vực: Hành lang\nTầng: ${floorIdx === 0 ? 'Trệt' : floorIdx + 1}`;
                    } else {
                        info = `Phòng: ${roomId}\nTầng: ${floorIdx === 0 ? 'Trệt' : floorIdx + 1}${extraData}`;
                    }

                tooltip.innerText = info;
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.classList.remove('hidden');

                clearTimeout(tooltipTimeout);
                tooltipTimeout = setTimeout(() => { tooltip.classList.add('hidden'); }, 3000); // Ẩn sau 3s nếu đứng yên
            } else {
                tooltip.classList.add('hidden');
            }
        });

        // 2D Map Rendering logic
        function render2DMap(floorIdx, activeRoom) {
            const container2D = document.getElementById('map-2d-container');
            if (activeRoom) {
                // Khi xem một phòng cụ thể thì ẩn map 2D
                if (container2D) container2D.classList.add('hidden');
                return;
            } else {
                if (container2D) container2D.classList.remove('hidden');
            }

            const canvas = document.getElementById('map-2d-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.clientWidth || 300;
            const H = canvas.clientHeight || 150;
            if(W === 0 || H === 0) return; // Canvas chưa hiện hình

            canvas.width = W;
            canvas.height = H;

            const floorTitle = document.getElementById('map-floor-name');
            if(floorTitle) floorTitle.innerText = `TẦNG ${floorIdx === 0 ? 'TRỆT' : floorIdx}`;

            ctx.clearRect(0, 0, W, H);

            // Vẽ bản đồ 2D đơn giản
            const scale = Math.min(W / 100, H / 40); // 100x40 là kích thước ảo của toà nhà
            const cx = W / 2;
            const cy = H / 2;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);

            // Vẽ hành lang (Giữa)
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(-40, -4, 80, 8);

            // Hàm vẽ phòng
            function drawRoom(rx, rz, id, color) {
                ctx.fillStyle = color;
                ctx.strokeStyle = '#00aaff';
                ctx.lineWidth = 0.5;
                ctx.fillRect(rx - 5, rz - 6, 10, 12);
                ctx.strokeRect(rx - 5, rz - 6, 10, 12);

                ctx.fillStyle = '#fff';
                ctx.font = '3px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(id, rx, rz + 1);
            }

            // Lặp vẽ các phòng trên và dưới
            for(let i=0; i<7; i++) {
                let rx = -36 + i*12;

                // Dãy trên (Z = -12)
                if (i > 0 && i < 6) {
                    let id = floorIdx === 0 ? `A10${i}` : `L${floorIdx+1}-T${i}`;
                    let sensor = latestSensorData && latestSensorData[id];
                    // Thử L1-A format nếu không tìm thấy
                    if (!sensor && id.startsWith('A10')) {
                        sensor = latestSensorData && latestSensorData['L1-A' + id.replace('A10', '')];
                    }
                    let smoke = sensor ? (sensor.smoke_status !== undefined ? sensor.smoke_status : (sensor.smoke || 0)) : 0;
                    let isDanger = sensor && (sensor.temp >= 38 || smoke >= 1.0 || sensor.co2 >= 900);
                    let isActive = sensor && sensor.temp >= 26 && !isDanger;
                    let color = isDanger ? '#aa0000' : (isActive ? '#008844' : (activeRoom === id ? '#0055aa' : '#0c0c0e'));
                    drawRoom(rx, -12, id, color);
                }

                // Dãy dưới (Z = 12)
                let idB = floorIdx === 0 ? `A10${i+7}` : `L${floorIdx+1}-B${i+1}`;
                let sensorB = latestSensorData && latestSensorData[idB];
                if (!sensorB && idB.startsWith('A10')) {
                    sensorB = latestSensorData && latestSensorData['L1-A' + idB.replace('A10', '')];
                }
                let smokeB = sensorB ? (sensorB.smoke_status !== undefined ? sensorB.smoke_status : (sensorB.smoke || 0)) : 0;
                let isDangerB = sensorB && (sensorB.temp >= 38 || smokeB >= 1.0 || sensorB.co2 >= 900);
                let isActiveB = sensorB && sensorB.temp >= 26 && !isDangerB;
                let colorB = isDangerB ? '#aa0000' : (isActiveB ? '#008844' : (activeRoom === idB ? '#0055aa' : '#0c0c0e'));
                drawRoom(rx, 12, idB, colorB);
            }

            // Vẽ robot trên 2D map bằng toạ độ Lerp
            if (current2DRobotPos && Math.round(current2DRobotPos.y/4) === floorIdx) {
                ctx.fillStyle = '#00ffff';
                ctx.beginPath();
                ctx.arc(current2DRobotPos.x, current2DRobotPos.z, 2, 0, Math.PI*2);
                ctx.fill();
                // Toả sáng
                ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(current2DRobotPos.x, current2DRobotPos.z, 4, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.restore();
        }

        function restoreOverallModel() {
            if (activeSubModel) {
                scene.remove(activeSubModel);
                activeSubModel = null;
                activeRoomId = null;
            }
            if (overallModel) {
                scene.add(overallModel);
            }

            // Zoom camera ra xa
            camera.position.set(0, 100, 120);
            controls.target.set(0, 10, 0);

            document.getElementById('btn-back').classList.add('hidden');
            document.getElementById('context-panel').classList.add('hidden');
            document.getElementById('click-info').innerText = "Click vào Toà nhà để bóc tách...";
            document.getElementById('click-info').style.color = '#3b82f6';
            document.getElementById('map-2d-container').classList.remove('hidden');
            activeFloorIdx = 0; // Quay về Tầng Trệt mặc định trên map 2D
        }

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Nền 2D mượt mà
            current2DRobotPos.lerp(targetRobotPos, 0.05);

// Cập nhật hiệu ứng đổi màu nhấp nháy 3D (60 FPS)
             let modelToAnimate = activeSubModel || overallModel;
             if (modelToAnimate && latestSensorData) {
                 let blink = (Math.sin(Date.now() * 0.005) + 1) / 2; // 0 -> 1
                 modelToAnimate.traverse((child) => {
                     if (child.isMesh && child.material) {
                         let roomId = "";
                         // Khi đang xem phòng chi tiết, dùng activeRoomId
                         if (activeSubModel && activeRoomId) {
                             roomId = activeRoomId;
                         } else {
                             let objName = (child.userData && child.userData.name) ? child.userData.name : child.name;
                             if (objName) {
                                 const match = objName.match(/(A10\d|L\d-[TB]\d)/i);
                                 if (match) roomId = match[1].toUpperCase();
                             }
                         }
                         
                         let materials = Array.isArray(child.material) ? child.material : [child.material];
                         materials.forEach((mat, idx) => {
                             let cKey = `originalColor_${idx}`;
                             if (child.userData[cKey] === undefined) child.userData[cKey] = mat.color.getHex();
                         });
                         
let sensor = roomId ? latestSensorData[roomId] : null;
                          if (!sensor && activeSubModel) {
                              sensor = latestSensorData[activeRoomId];
                          }
                          
                          // Chuẩn hoá smoke_status/smoke
                          let smokeVal = sensor ? (sensor.smoke_status !== undefined ? sensor.smoke_status : (sensor.smoke || 0)) : 0;
                          
                          materials.forEach((mat, idx) => {
                              let cKey = `originalColor_${idx}`;
                              if (child.userData[cKey] !== undefined) {
                                  let baseColor = new THREE.Color(child.userData[cKey]);
                                  let targetColor = new THREE.Color();
                                  
if (sensor) {
                                      // Chuẩn hoá smoke_status/smoke
                                      let smokeVal = sensor.smoke_status !== undefined ? sensor.smoke_status : (sensor.smoke || 0);
                                      
                                      if (smokeVal >= 1.0 || sensor.temp >= 38 || sensor.co2 >= 900) {
                                          targetColor.setHex(0xff0000); // Đỏ cháy (CRITICAL)
                                          mat.color.copy(baseColor).lerp(targetColor, 0.6 + 0.4 * blink);
                                      } else if (smokeVal >= 0.5 || sensor.temp >= 32 || sensor.co2 >= 631) {
                                          targetColor.setHex(0xffaa00); // Vàng (WARNING)
                                          mat.color.copy(baseColor).lerp(targetColor, 0.5);
                                      } else {
                                          targetColor.setHex(0x00ff00); // Xanh lá (Bình thường)
                                          mat.color.copy(baseColor).lerp(targetColor, 0.5);
                                      }
                                  } else if (activeSubModel) {
                                      // Mặc định xanh lá cho phòng chi tiết khi không có sensor
                                      targetColor.setHex(0x00ff00);
                                      mat.color.copy(baseColor).lerp(targetColor, 0.5);
                                  } else {
                                      // Mô hình tòa nhà: chỉ L1-A1 (A101) là xanh lá, phòng khác giữ màu gốc
                                      if (roomId === 'A101' || roomId === 'L1-A1') {
                                          targetColor.setHex(0x00ff00);
                                          mat.color.copy(baseColor).lerp(targetColor, 0.5);
                                      } else {
                                          mat.color.copy(baseColor);
                                      }
                                  }
                              }
                          });
                     }
                 });
             }

            // Render map liên tục để thấy chuyển động 60fps
            if (!activeRoomId) {
                // Nếu chưa vào phòng nào, ta render tầng hiện tại (activeFloorIdx)
                render2DMap(activeFloorIdx, null);
            }

            renderer.render(scene, camera);
        }

        // Khởi động
        fetchLogs();
        init3D();
    </script>
</body>
</html>
